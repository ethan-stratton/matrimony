<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrimony Beyond Space and Time — Project Board</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--card:#16213e;--gold:#d4a830;--text:#e0e0e0;--text-dim:#8a8a9a;--red:#e74c3c;--yellow:#f39c12;--green:#27ae60;--col1:#121a30;--col2:#1a1a2e;--col3:#0f1a20;--radius:8px;--transition:0.2s ease}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
button{cursor:pointer;font-family:inherit}
/* Header */
.header{background:#0d0d1a;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a2a4a;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:16px}
.header h1{font-size:18px;color:var(--gold);font-weight:700;letter-spacing:0.5px}
.header-links{display:flex;gap:12px}
.header-links a{color:var(--text-dim);text-decoration:none;font-size:13px;transition:color var(--transition)}
.header-links a:hover{color:var(--gold)}
.header-right{display:flex;gap:8px}
.header-btn{background:#2a2a4a;border:1px solid #3a3a5a;color:var(--text-dim);padding:6px 12px;border-radius:var(--radius);font-size:12px;transition:all var(--transition)}
.header-btn:hover{border-color:var(--gold);color:var(--gold)}
/* Tabs */
.tabs{display:flex;gap:0;background:#0d0d1a;padding:0 24px;border-bottom:2px solid #2a2a4a;flex-shrink:0}
.tab{padding:12px 20px;font-size:14px;color:var(--text-dim);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all var(--transition);font-weight:500}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
/* Panels */
.panel{display:none;flex:1;overflow:hidden}
.panel.active{display:flex;flex-direction:column}
/* Kanban */
.kanban{display:flex;gap:16px;padding:16px 24px;flex:1;overflow-x:auto;min-height:0}
.column{flex:1;min-width:280px;max-width:400px;background:var(--col1);border-radius:var(--radius);display:flex;flex-direction:column;border:1px solid #2a2a4a}
.column:nth-child(2){background:var(--col2)}
.column:nth-child(3){background:var(--col3)}
.column.drag-over{border:2px dashed var(--gold)}
.col-header{padding:14px 16px;font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a2a4a}
.col-header .count{background:#2a2a4a;color:var(--text-dim);font-size:11px;padding:2px 8px;border-radius:10px;font-weight:400}
.col-cards{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px;min-height:60px}
.col-cards::-webkit-scrollbar{width:4px}
.col-cards::-webkit-scrollbar-thumb{background:#3a3a5a;border-radius:2px}
/* Task Card */
.task-card{background:var(--card);border-radius:var(--radius);padding:12px;cursor:grab;border:1px solid transparent;transition:all var(--transition);position:relative}
.task-card:hover{transform:translateY(-1px);border-color:var(--gold);box-shadow:0 4px 12px rgba(212,168,48,0.15)}
.task-card.dragging{opacity:0.4}
.task-card .title-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.task-card .task-title{font-size:13px;font-weight:600;flex:1}
.task-card .delete-btn{background:none;border:none;color:#555;font-size:14px;padding:0 2px;line-height:1;transition:color var(--transition);flex-shrink:0}
.task-card .delete-btn:hover{color:var(--red)}
.task-card .tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.tag-priority{color:#fff}
.tag-high{background:var(--red)}
.tag-medium{background:var(--yellow);color:#1a1a2e}
.tag-low{background:var(--green)}
.tag-category{background:#2a2a4a;color:var(--text-dim)}
.task-card .description{font-size:12px;color:var(--text-dim);margin-top:8px;display:none;white-space:pre-wrap}
.task-card.expanded .description{display:block}
.task-card .desc-toggle{background:none;border:none;color:var(--text-dim);font-size:11px;margin-top:6px;padding:0;transition:color var(--transition)}
.task-card .desc-toggle:hover{color:var(--gold)}
/* Inline edit */
.task-card .edit-area{display:none;margin-top:8px}
.task-card.editing .edit-area{display:block}
.task-card.editing .tags,.task-card.editing .desc-toggle,.task-card.editing .description{display:none}
.edit-area input,.edit-area select,.edit-area textarea{width:100%;background:#0d0d1a;border:1px solid #3a3a5a;color:var(--text);padding:6px 8px;border-radius:4px;font-size:12px;margin-bottom:6px;font-family:inherit}
.edit-area textarea{resize:vertical;min-height:50px}
.edit-area .edit-actions{display:flex;gap:6px;justify-content:flex-end}
.edit-area .edit-actions button{padding:4px 12px;border-radius:4px;border:1px solid #3a3a5a;font-size:11px;background:#2a2a4a;color:var(--text)}
.edit-area .edit-actions .save-btn{background:var(--gold);color:#1a1a2e;border-color:var(--gold);font-weight:600}
/* Add task */
.add-task-btn{background:none;border:1px dashed #3a3a5a;color:var(--text-dim);padding:10px;border-radius:var(--radius);font-size:13px;margin:8px;transition:all var(--transition)}
.add-task-btn:hover{border-color:var(--gold);color:var(--gold)}
.add-form{padding:8px;display:none}
.add-form.visible{display:block}
.add-form input,.add-form select,.add-form textarea{width:100%;background:#0d0d1a;border:1px solid #3a3a5a;color:var(--text);padding:6px 8px;border-radius:4px;font-size:12px;margin-bottom:6px;font-family:inherit}
.add-form textarea{resize:vertical;min-height:40px}
.add-form .form-row{display:flex;gap:6px}
.add-form .form-row select{flex:1}
.add-form .form-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:4px}
.add-form .form-actions button{padding:5px 14px;border-radius:4px;border:none;font-size:12px}
.add-form .cancel-btn{background:#2a2a4a;color:var(--text-dim)}
.add-form .submit-btn{background:var(--gold);color:#1a1a2e;font-weight:600}
/* Decisions */
.decisions{display:flex;gap:16px;padding:16px 24px;flex:1;overflow:hidden}
.dec-column{flex:1;background:var(--col1);border-radius:var(--radius);display:flex;flex-direction:column;border:1px solid #2a2a4a;overflow:hidden}
.dec-column:nth-child(2){background:var(--col2)}
.dec-cards{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px}
.dec-cards::-webkit-scrollbar{width:4px}
.dec-cards::-webkit-scrollbar-thumb{background:#3a3a5a;border-radius:2px}
.dec-card{background:var(--card);border-radius:var(--radius);padding:12px;border:1px solid transparent;transition:all var(--transition)}
.dec-card:hover{border-color:var(--gold);box-shadow:0 2px 8px rgba(212,168,48,0.1)}
.dec-card .dec-title{font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.dec-card .dec-body{font-size:12px;color:var(--text-dim);margin-top:6px;white-space:pre-wrap}
.dec-card textarea{width:100%;background:#0d0d1a;border:1px solid #3a3a5a;color:var(--text);padding:6px 8px;border-radius:4px;font-size:12px;margin-top:6px;font-family:inherit;resize:vertical;min-height:40px}
.dec-card .toggle-btn{background:none;border:none;font-size:16px;cursor:pointer;padding:2px;transition:transform var(--transition)}
.dec-card .toggle-btn:hover{transform:scale(1.2)}
.dec-card .delete-btn{background:none;border:none;color:#555;font-size:14px;cursor:pointer;margin-left:6px}
.dec-card .delete-btn:hover{color:var(--red)}
/* Ideas */
.ideas-panel{padding:16px 24px;flex:1;display:flex;flex-direction:column}
.ideas-panel textarea{flex:1;background:#0d0d1a;border:1px solid #2a2a4a;color:var(--text);padding:16px;border-radius:var(--radius);font-family:'Courier New',Courier,monospace;font-size:14px;resize:none;line-height:1.6}
.ideas-panel textarea:focus{outline:none;border-color:var(--gold)}
.ideas-status{font-size:11px;color:var(--text-dim);margin-top:6px;text-align:right}
/* Import overlay */
.import-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center}
.import-overlay.visible{display:flex}
.import-box{background:var(--card);border:1px solid var(--gold);border-radius:var(--radius);padding:24px;width:90%;max-width:500px}
.import-box h3{margin-bottom:12px;color:var(--gold)}
.import-box textarea{width:100%;height:200px;background:#0d0d1a;border:1px solid #3a3a5a;color:var(--text);padding:10px;border-radius:4px;font-family:monospace;font-size:12px;margin-bottom:12px}
.import-box .import-actions{display:flex;gap:8px;justify-content:flex-end}
.import-box .import-actions button{padding:6px 16px;border-radius:4px;border:none;font-size:13px}
</style>
</head>

  <button class="tab active" data-tab="tasks">📋 Tasks</button>

  <button class="tab" data-tab="ideas">💡 Ideas</button>

<div class="panel active" id="panel-tasks">

</div>

<div class="panel" id="panel-decisions">

</div>

<div class="panel" id="panel-lore">
  <div class="ideas-panel">

    <div class="ideas-status" id="lore-status">Saved</div>
  </div>
</div>

<div class="panel" id="panel-ideas">
  <div class="ideas-panel">
    <textarea id="ideas-text" spellcheck="false"></textarea>
    <div class="ideas-status" id="ideas-status">Saved</div>
  </div>
</div>

<div class="import-overlay" id="import-overlay">
  <div class="import-box">
    <h3>Import JSON Data</h3>
    <textarea id="import-text" placeholder="Paste exported JSON here..."></textarea>
    <div class="import-actions">
      <button style="background:#2a2a4a;color:#8a8a9a" onclick="hideImport()">Cancel</button>
      <button style="background:#d4a830;color:#1a1a2e;font-weight:600" onclick="doImport()">Import</button>
    </div>
  </div>
</div>

lore:`# WORLD: MATRIMONY BEYOND SPACE AND TIME

## The Premise
A long time ago — so long no one remembers — everything was joined. Matter and spirit. Living and dead. Space and time. Then something severed. A Divorce on a cosmic scale.

Nobody knows what caused it. The sky has rings, debris, something that might be a station. Trees grow through ancient reactors. Fossilized machines in canyon walls. Technology and nature merged. The planet grew around its own ruins.

## The Title
"Matrimony" from Latin: mater (mother) + monium (state). Union that creates.

In this world, matrimony is the fundamental force:
- Human bonds with weapon → Awakening = matrimony of will and matter
- Transformation = matrimony of consciousness and something older
- Combos = two actions becoming something neither could be alone
- Combat itself: Eff/Def/Wait = reaching out, holding yourself, the space between

## The Aesthetic: Deep Time
Layers of time collapsed into a single moment. A sword forged from a meteorite that was a satellite that was a seed. Reactor-trees humming. Nautilus shells that might be natural or engineered.

Space is present but unreachable — like the ocean in ancient mythology.

References: Nausicaa, Angel's Egg, Moebius, BoF Dragon Quarter.

## The Tone
NOT grimdark. Nausicaa meets Beet the Vandel Buster.

People argue about cooking. Fall in love badly. Name weapons embarrassing things. Make poop jokes after eating glowing mushrooms. The adventure is fun. The depth is there for those who look.

Mono no aware — things are beautiful because they end.

## The Lonesome People
Small fragile clusters. Groups larger than dozens feel the Drift — people scatter. Connection at scale doesn't hold.

Individual NPCs carry personal philosophies:
- God is dreaming and the world is the dream
- Collecting fragments, convinced patience can repair the Divorce
- Stopped hoping, just lives — the happiest person you'll meet
- The Divorce was a birth, not a death — separation is growth

## The Bonding Rush
Recently, some individuals can Soul Bond with ancient relics. Gold rush:
- Relic Hunters (noble, idiots, both) — this is you
- Bonded Factions controlling ruin sites
- The Unbonded Majority — awed, resentful, or selling fakes

## The Player
Silent protagonist. Relic hunter hearing old frequencies. Didn't ask for this. Looking for people. Wanting a friend.

Can't learn what caused the Divorce. Like Bastion — piece together fragments, feel the shape. The full truth is beyond reach.

## Evanui
Goes by Evan. Later: Evanui. (Évanouir — to vanish, to disappear.)

Can't bond. Can't transform. But doesn't Drift. He stays.

Rates weapons /10. Ranking of creatures by "how bad it smelled." Falls asleep during awakenings. Thinks Drain Touch is "nasty but cool."

The proof that some bonds hold without ancient power. Just stubbornness.

The Beet connection: Poala has no Saiga. She's there because she cares about Beet, not the mission.

## Creatures
Nothing is evil. Creatures hunger for connection. Slime engulfs to merge. Dragon's fire is reaching out. The more warped, the more lonely.

Dark Knight = person who forgot themselves inside bonded armor. Skeleton = body-soul bond that partially worked but didn't hold.

Every fight is a failed matrimony — two beings reaching through the only language the broken world left them.

## The Villain
Systematically acquiring the most powerful relics. Trade, persuasion, theft, charm. Building toward forced complete Matrimony.

Sounds noble — world IS broken. But: forced union = obliteration of individuality. No more self. No more choice. No more campfire.

Great villain test: someone the hero could have become.

## Searching for the Mystery
Like Nausicaa and Yupa searching for the forest's mystery — it's inside Nausicaa the whole time.

"You are still alive because you tried to save a helpless creature and that creature remembered."

## Design Pillars
- Fights that MEAN something
- Power that costs something
- Bonds that grow and strain
- A villain you understand
- Humor that's real
- Moments of absolute coolness
- Depth that rewards attention
- Something REAL underneath

## Open Questions
- Regional conflict structure
- Escalation mechanic (Surges?)
- Villain identity — who? what did they lose?
- Secondary cast beyond Evanui
- The ending
`,
ideas:`## Quick Ideas
- Enemies that only appear at certain times?
- Weather system affecting combat?
- Secret rooms behind breakable walls
- Boss that learns your patterns
- Musical cue when combo is available
- Gambling minigame?

## Nausicaa / Ohm Connection
- Hive mind race that remembers everything
- Saved a helpless creature → it remembered → gave life force to continue

## Combat Design Notes (Helen's MC)
- No single strategy dominates: shields get pierced, slow spells get stunned, heals get rushed, turtling gets sealed
- Metronome (Wait 1) = scout tool. Peek for almost no commitment.

## Transformation Combo Secrets
- Vampire + Drain Touch → any = "Blood Frenzy" (Eff scales with Blood)
- Werewolf + Claw → Bite = "Savage" (Bite doubled)
- Lich + Thunder × 2 = "Chain Lightning" (0 Def, 1.5×)
- Revenant + any at 1 HP = "Defiance" (Eff doubled)
- Berserker + 5-streak + Broadsword = "Deathblow" (3× Eff, 10 self-dmg)
- Chronomancer + Seal predicted action = "Paradox" (seal lasts 3 cycles)

## Name Candidates
- Vael — veil + vale
- Tessera — fragment of mosaic
- Lethara — Lethe + earth
- Auros — aura + ouroboros + gold
`

let _id=0;function id(){return'id_'+Date.now()+'_'+(++_id)}
let data;
function load(){try{const s=localStorage.getItem(STORAGE_KEY);data=s?JSON.parse(s):defaultData()}catch(e){data=defaultData()}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}

// Tabs
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('panel-'+t.dataset.tab).classList.add('active');
}));

// KANBAN
function renderKanban(){
  const kb=document.getElementById('kanban');kb.innerHTML='';
  COLUMNS.forEach(col=>{
    const tasks=data.tasks[col]||[];
    const div=document.createElement('div');div.className='column';div.dataset.col=col;
    div.innerHTML=`<div class="col-header"><span>${COL_NAMES[col]}</span><span class="count">${tasks.length}</span></div>`;
    const cards=document.createElement('div');cards.className='col-cards';
    cards.addEventListener('dragover',e=>{e.preventDefault();div.classList.add('drag-over')});
    cards.addEventListener('dragleave',()=>div.classList.remove('drag-over'));
    cards.addEventListener('drop',e=>{e.preventDefault();div.classList.remove('drag-over');dropTask(e,col)});
    tasks.forEach(t=>cards.appendChild(makeTaskCard(t,col)));
    div.appendChild(cards);
    // Add form
    const addForm=document.createElement('div');addForm.className='add-form';addForm.innerHTML=`
      <input type="text" placeholder="Task title..." class="af-title">
      <textarea placeholder="Description (optional)" class="af-desc"></textarea>
      <div class="form-row">
        <select class="af-priority"><option value="high">🔴 High</option><option value="medium" selected>🟡 Medium</option><option value="low">🟢 Low</option></select>
        <select class="af-cat">${CATEGORIES.map(c=>`<option>${c}</option>`).join('')}</select>
      </div>
      <div class="form-actions">
        <button class="cancel-btn" onclick="this.closest('.add-form').classList.remove('visible')">Cancel</button>
        <button class="submit-btn">Add</button>
      </div>`;
    addForm.querySelector('.submit-btn').addEventListener('click',()=>{
      const title=addForm.querySelector('.af-title').value.trim();
      if(!title)return;
      data.tasks[col].push({id:id(),title,desc:addForm.querySelector('.af-desc').value,priority:addForm.querySelector('.af-priority').value,categories:[addForm.querySelector('.af-cat').value]});
      save();renderKanban();
    });
    div.appendChild(addForm);
    const addBtn=document.createElement('button');addBtn.className='add-task-btn';addBtn.textContent='+ Add task';
    addBtn.addEventListener('click',()=>addForm.classList.toggle('visible'));
    div.appendChild(addBtn);
    kb.appendChild(div);
  });
}

let dragData=null;
function makeTaskCard(t,col){
  const el=document.createElement('div');el.className='task-card';el.draggable=true;el.dataset.id=t.id;el.dataset.col=col;
  const priLabel={high:'🔴 High',medium:'🟡 Medium',low:'🟢 Low'};
  const priClass={high:'tag-high',medium:'tag-medium',low:'tag-low'};
  el.innerHTML=`
    <div class="title-row"><span class="task-title">${esc(t.title)}</span><button class="delete-btn" title="Delete">×</button></div>
    <div class="tags"><span class="tag tag-priority ${priClass[t.priority]}">${priLabel[t.priority]}</span>${(t.categories||[]).map(c=>`<span class="tag tag-category" style="border:1px solid ${CAT_COLORS[c]||'#3a3a5a'};color:${CAT_COLORS[c]||'#8a8a9a'}">${esc(c)}</span>`).join('')}</div>
    ${t.desc?`<button class="desc-toggle">▸ Details</button><div class="description">${esc(t.desc)}</div>`:''}
    <div class="edit-area">
      <input type="text" class="ed-title" value="${esc(t.title)}">
      <textarea class="ed-desc">${esc(t.desc||'')}</textarea>
      <div class="form-row">
        <select class="ed-priority">${['high','medium','low'].map(p=>`<option value="${p}"${p===t.priority?' selected':''}>${priLabel[p]}</option>`).join('')}</select>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin:4px 0">${CATEGORIES.map(c=>`<label style="font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:3px"><input type="checkbox" class="ed-cat" value="${c}"${(t.categories||[]).includes(c)?' checked':''}>${c}</label>`).join('')}</div>
      <div class="edit-actions"><button onclick="this.closest('.task-card').classList.remove('editing')">Cancel</button><button class="save-btn">Save</button></div>
    </div>`;
  el.querySelector('.delete-btn').addEventListener('click',e=>{e.stopPropagation();if(confirm('Delete "'+t.title+'"?')){data.tasks[col]=data.tasks[col].filter(x=>x.id!==t.id);save();renderKanban()}});
  const toggle=el.querySelector('.desc-toggle');
  if(toggle)toggle.addEventListener('click',e=>{e.stopPropagation();el.classList.toggle('expanded');toggle.textContent=el.classList.contains('expanded')?'▾ Details':'▸ Details'});
  el.querySelector('.task-title').addEventListener('dblclick',e=>{e.stopPropagation();el.classList.add('editing')});
  el.querySelector('.save-btn').addEventListener('click',e=>{e.stopPropagation();
    t.title=el.querySelector('.ed-title').value.trim()||t.title;
    t.desc=el.querySelector('.ed-desc').value;
    t.priority=el.querySelector('.ed-priority').value;
    t.categories=[...el.querySelectorAll('.ed-cat:checked')].map(x=>x.value);
    save();renderKanban();
  });
  el.addEventListener('dragstart',e=>{dragData={id:t.id,fromCol:col};el.classList.add('dragging');e.dataTransfer.effectAllowed='move'});
  el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  return el;
}
function dropTask(e,toCol){
  if(!dragData)return;
  const{id:tid,fromCol}=dragData;dragData=null;
  if(fromCol===toCol)return;
  const idx=data.tasks[fromCol].findIndex(t=>t.id===tid);
  if(idx<0)return;
  const[task]=data.tasks[fromCol].splice(idx,1);
  data.tasks[toCol].push(task);save();renderKanban();
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// DECISIONS
function renderDecisions(){
  const container=document.getElementById('decisions');container.innerHTML='';
  ['decided','discussing'].forEach(status=>{
    const col=document.createElement('div');col.className='dec-column';
    col.innerHTML=`<div class="col-header"><span>${status==='decided'?'Decided ✅':'Under Discussion 🤔'}</span><span class="count">${(data.decisions[status]||[]).length}</span></div>`;
    const cards=document.createElement('div');cards.className='dec-cards';
    (data.decisions[status]||[]).forEach(d=>{
      const card=document.createElement('div');card.className='dec-card';
      const other=status==='decided'?'discussing':'decided';
      card.innerHTML=`
        <div class="dec-title"><span>${esc(d.title)}</span><span><button class="toggle-btn" title="Move to ${other}">${status==='decided'?'🔄':'✅'}</button><button class="delete-btn" title="Delete">×</button></span></div>
        ${d.desc?`<div class="dec-body">${esc(d.desc)}</div>`:''}
        <textarea placeholder="${status==='decided'?'Rationale / notes...':'Pros, cons, notes...'}">${esc(d.notes||'')}</textarea>`;
      card.querySelector('.toggle-btn').addEventListener('click',()=>{
        data.decisions[status]=data.decisions[status].filter(x=>x.id!==d.id);
        data.decisions[other].push(d);save();renderDecisions();
      });
      card.querySelector('.delete-btn').addEventListener('click',()=>{
        if(confirm('Delete "'+d.title+'"?')){data.decisions[status]=data.decisions[status].filter(x=>x.id!==d.id);save();renderDecisions()}
      });
      let timer;card.querySelector('textarea').addEventListener('input',e=>{d.notes=e.target.value;clearTimeout(timer);timer=setTimeout(save,500)});
      cards.appendChild(card);
    });
    col.appendChild(cards);
    const addBtn=document.createElement('button');addBtn.className='add-task-btn';addBtn.textContent='+ Add decision';
    addBtn.addEventListener('click',()=>{
      const title=prompt('Decision title:');if(!title)return;
      data.decisions[status].push({id:id(),title,desc:'',notes:''});save();renderDecisions();
    });
    col.appendChild(addBtn);
    container.appendChild(col);
  });
}

// IDEAS
function renderIdeas(){
  const ta=document.getElementById('ideas-text');ta.value=data.ideas||'';
  let timer;ta.addEventListener('input',()=>{
    data.ideas=ta.value;clearTimeout(timer);
    document.getElementById('ideas-status').textContent='Saving...';
    timer=setTimeout(()=>{save();document.getElementById('ideas-status').textContent='Saved ✓'},400);
  });
}

// IMPORT/EXPORT
function exportData(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='matrimony_todo_backup.json';a.click();
}
function showImport(){document.getElementById('import-overlay').classList.add('visible')}
function hideImport(){document.getElementById('import-overlay').classList.remove('visible')}
function doImport(){
  try{const d=JSON.parse(document.getElementById('import-text').value);data=d;save();hideImport();renderKanban();renderDecisions();renderIdeas();alert('Imported!')}
  catch(e){alert('Invalid JSON: '+e.message)}
}

// LORE
function renderLore(){
  const ta=document.getElementById('lore-text');ta.value=data.lore||'';
  let timer;ta.addEventListener('input',()=>{
    data.lore=ta.value;clearTimeout(timer);
    document.getElementById('lore-status').textContent='Saving...';
    timer=setTimeout(()=>{save();document.getElementById('lore-status').textContent='Saved ✓'},400);
  });
}

// INIT
load();renderKanban();renderDecisions();renderIdeas();renderLore();
</script>
</body>
</html>
