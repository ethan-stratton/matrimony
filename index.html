// AUDIO
// ══════════════════════════════════
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  return audioCtx;
}
// Unlock audio on first interaction (silent buffer trick for Safari)
function unlockAudio() {
  const ac = getAudioCtx();
  const buf = ac.createBuffer(1, 1, ac.sampleRate);
  const src = ac.createBufferSource();
  src.buffer = buf;
  src.connect(ac.destination);
  src.start(0);
  if (ac.state !== 'running') ac.resume();
  // Start title music if on title screen
  if (state.screen === 'title' && !titleMusicStarted) {
    titleMusic.play().then(() => { console.log('title music started via unlockAudio'); titleMusicStarted = true; }).catch(e => console.warn('title music unlock fail:', e));
  }
  // Start ambient wind
  startAmbientWind();
}
document.addEventListener('touchstart', unlockAudio, { once: true });
document.addEventListener('mousedown', unlockAudio, { once: true });
document.addEventListener('keydown', unlockAudio, { once: true });

let windNode = null;
function startAmbientWind() {
  if (windNode) return;
  const ac = getAudioCtx();
  // Generate brown noise (low-freq wind)
  const len = ac.sampleRate * 2;
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const data = buf.getChannelData(0);
  let last = 0;
  for (let i = 0; i < len; i++) {
    const white = Math.random() * 2 - 1;
    last = (last + 0.02 * white) / 1.02;
    data[i] = last * 3.5;
  }
  const src = ac.createBufferSource();
  src.buffer = buf;
  src.loop = true;
  // Low-pass for soft wind
  const filter = ac.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 400;
  // Very quiet
  const gain = ac.createGain();
  gain.gain.value = 0.06;
  src.connect(filter);
  filter.connect(gain);
  gain.connect(ac.destination);
  src.start(0);
  windNode = { src, gain };
}
let footstepAlt = false;
function playFootstep() {
  const ac = getAudioCtx();
  if (ac.state !== 'running') return;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = 'square';
  const basePitch = footstepAlt ? 175 : 145;
  osc.frequency.value = basePitch + (Math.random() - 0.5) * 40;
  footstepAlt = !footstepAlt;
  gain.gain.value = 0.12;
  osc.connect(gain);
  gain.connect(ac.destination);
  const t = ac.currentTime;
  osc.start(t);
  osc.stop(t + 0.07);
  // Fade out manually
  gain.gain.setValueAtTime(0.12, t);
  gain.gain.linearRampToValueAtTime(0, t + 0.07);
}
function playTick() {
  const ac = getAudioCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = 'square';
  osc.frequency.value = 600;
  gain.gain.value = 0.12;
  osc.connect(gain);
  gain.connect(ac.destination);
  const t = ac.currentTime;
  osc.start(t);
  osc.stop(t + 0.05);
  gain.gain.setValueAtTime(0.12, t);
  gain.gain.linearRampToValueAtTime(0, t + 0.05);
}
function playHit(isEnemy) {
  const ac = getAudioCtx();
  const bufferSize = Math.floor(ac.sampleRate * 0.1);
  const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
  const src = ac.createBufferSource();
  src.buffer = buffer;
  const gain = ac.createGain();
  const t = ac.currentTime;
  gain.gain.value = isEnemy ? 0.2 : 0.15;
  gain.gain.setValueAtTime(gain.gain.value, t);
  gain.gain.linearRampToValueAtTime(0, t + 0.1);
  const filter = ac.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = isEnemy ? 800 : 1200;
  src.connect(filter);
  filter.connect(gain);
  gain.connect(ac.destination);
  src.start(t);
}
function playChestOpen() {
  const ac = getAudioCtx();
  if (ac.state !== 'running') return;
  const t = ac.currentTime;
  // Ascending sparkle — three quick tones
  [523, 659, 784].forEach((freq, i) => {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    gain.gain.value = 0.08;
    gain.gain.setValueAtTime(0.08, t + i * 0.08);
    gain.gain.linearRampToValueAtTime(0, t + i * 0.08 + 0.12);
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.start(t + i * 0.08);
    osc.stop(t + i * 0.08 + 0.12);
  });
}
function playBattleStart() {
  const ac = getAudioCtx();
  if (ac.state !== 'running') return;
  const t = ac.currentTime;
  // Rising sweep + impact
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(200, t);
  osc.frequency.exponentialRampToValueAtTime(800, t + 0.25);
  gain.gain.value = 0.1;
  gain.gain.setValueAtTime(0.1, t);
  gain.gain.linearRampToValueAtTime(0.15, t + 0.2);
  gain.gain.linearRampToValueAtTime(0, t + 0.35);
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.start(t);
  osc.stop(t + 0.35);
  // Impact thud at end
  const bufSize = Math.floor(ac.sampleRate * 0.1);
  const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
  const src = ac.createBufferSource();
  src.buffer = buf;
  const g2 = ac.createGain();
  g2.gain.value = 0.2;
  g2.gain.setValueAtTime(0.2, t + 0.25);
  g2.gain.linearRampToValueAtTime(0, t + 0.4);
  const filt = ac.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = 600;
  src.connect(filt);
  filt.connect(g2);
  g2.connect(ac.destination);
  src.start(t + 0.25);
}
// ── Earthbound-style battle backgrounds ──
const EB_PALETTES = {
  fire: [[20,0,0],[80,0,0],[160,30,0],[220,80,0],[255,160,20],[255,220,80],[255,255,180],[255,220,80]],
  void: [[0,0,0],[20,0,40],[50,0,80],[80,20,120],[50,0,80],[20,0,40],[5,0,10],[0,0,0]],
  neon: [[255,0,100],[255,0,255],[100,0,255],[0,100,255],[0,255,200],[0,255,100],[255,255,0],[255,0,100]],
  ocean: [[0,5,30],[0,20,80],[0,60,140],[0,120,180],[40,180,220],[120,220,255],[200,240,255],[40,180,220]],
  psychedelic: [[148,0,211],[75,0,130],[0,0,255],[0,255,0],[255,255,0],[255,127,0],[255,0,0],[148,0,211]],
  candy: [[255,100,150],[255,150,200],[200,150,255],[150,200,255],[150,255,200],[200,255,150],[255,255,150],[255,200,150]],
  aurora: [[0,10,20],[0,40,40],[0,120,80],[0,200,100],[80,255,140],[0,200,180],[40,80,160],[0,20,60]],
};

const EB_PRESETS = {
  'Giygas': {
    l1: { palette: 'fire', distType: 2, amp: 12, freq: 0.04, speed: 0.015, scrollX: 0, scrollY: 0.4, palSpeed: 0.5, scale: 0.8 },
    l2: { palette: 'void', distType: 1, amp: 8, freq: 0.03, speed: 0.01, scrollX: 0.1, scrollY: -0.1, palSpeed: 0.4, scale: 1.2, opacity: 0.6 }
  },
  'Moonside': {
    l1: { palette: 'psychedelic', distType: 1, amp: 6, freq: 0.035, speed: 0.05, scrollX: 0.3, scrollY: 0.3, palSpeed: 2.5, scale: 0.6 },
    l2: { palette: 'neon', distType: 2, amp: 10, freq: 0.02, speed: 0.03, scrollX: -0.8, scrollY: 1.0, palSpeed: 1.8, scale: 1.0, opacity: 0.55 }
  },
  'Deep Dark': {
    l1: { palette: 'void', distType: 2, amp: 8, freq: 0.05, speed: 0.04, scrollX: 0, scrollY: 0.8, palSpeed: 0.5, scale: 1.0 },
    l2: { palette: 'ocean', distType: 1, amp: 4, freq: 0.03, speed: 0.02, scrollX: 0.3, scrollY: -0.3, palSpeed: 0.8, scale: 1.8, opacity: 0.35 }
  },
};

// Map enemy types to background presets
const ENEMY_BG = { 'Enemy1': 'Giygas' };

function ebSampleColors(colors, t) {
  const n = colors.length;
  const idx = ((t % 1) + 1) % 1 * n;
  const i0 = Math.floor(idx) % n;
  const i1 = (i0 + 1) % n;
  const f = idx - Math.floor(idx);
  return [
    colors[i0][0] + (colors[i1][0] - colors[i0][0]) * f,
    colors[i0][1] + (colors[i1][1] - colors[i0][1]) * f,
    colors[i0][2] + (colors[i1][2] - colors[i0][2]) * f
  ];
}

function ebBasePattern(x, y, scale) {
  const sx = x / (32 * scale), sy = y / (32 * scale);
  const v = (Math.sin(sx * 6.28) * Math.cos(sy * 6.28)
           + Math.sin((sx + sy) * 4.5)
           + Math.cos((sx - sy) * 3.7)) / 3;
  return (v + 1) / 2;
}

// Offscreen canvas for EB background
let ebCanvas = null, ebCtx = null, ebImgData = null, ebBuf = null;
let ebTime = 0;

function drawEBBackground(ctx, x, y, w, h, presetName) {
  if (!ebCanvas) {
    ebCanvas = document.createElement('canvas');
    ebCanvas.width = 128; // low-res for performance
    ebCanvas.height = 64;
    ebCtx = ebCanvas.getContext('2d');
    ebImgData = ebCtx.createImageData(128, 64);
    ebBuf = ebImgData.data;
  }
  const preset = EB_PRESETS[presetName] || EB_PRESETS['Giygas'];
  const RW = 128, RH = 64;
  ebTime++;
  const t = ebTime;
  
  // Render two layers and blend
  for (let py = 0; py < RH; py++) {
    for (let px = 0; px < RW; px++) {
      let r = 0, g = 0, b = 0;
      for (const [li, layer] of [preset.l1, preset.l2].entries()) {
        if (!layer) continue;
        const offset = layer.amp * Math.sin(layer.freq * py + layer.speed * t);
        let sx = px, sy = py;
        if (layer.distType === 0) sx = px + offset;
        else if (layer.distType === 1) sx = px + (py % 2 === 0 ? offset : -offset);
        else if (layer.distType === 2) sy = py + offset;
        sx += layer.scrollX * t;
        sy += layer.scrollY * t;
        const v = ebBasePattern(sx, sy, layer.scale);
        const palT = v + layer.palSpeed * t * 0.001;
        const pal = EB_PALETTES[layer.palette] || EB_PALETTES['fire'];
        const c = ebSampleColors(pal, palT);
        const op = li === 1 ? (layer.opacity || 0.5) : 1;
        if (li === 0) { r = c[0]; g = c[1]; b = c[2]; }
        else { r = r * (1 - op) + c[0] * op; g = g * (1 - op) + c[1] * op; b = b * (1 - op) + c[2] * op; }
      }
      const bi = (py * RW + px) * 4;
      ebBuf[bi] = r | 0; ebBuf[bi+1] = g | 0; ebBuf[bi+2] = b | 0; ebBuf[bi+3] = 255;
    }
  }
  ebCtx.putImageData(ebImgData, 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(ebCanvas, x, y, w, h);
  ctx.imageSmoothingEnabled = false;
}

{

// ══════════════════════════════════
// GAME STATE
// ══════════════════════════════════
// ══════════════════════════════════
// SAVE SYSTEM
// ══════════════════════════════════
function saveGame(slot) {
  if (state.combat || state.screen !== 'game') return false;
  const data = {
    version: 1,
    levelId: currentLevelId,
    levelName: state.levelName || currentLevelId || 'Unknown',
    playerX: state.player.x,
    playerY: state.player.y,
    facing: state.facing,
    inventory: state.inventory,
    actionOrder: state.actionOrder || null,
    flags: state.flags,
    openedChests: state.openedChests,
    defeatedEnemies: state.defeatedEnemies,
    encounterCounts: state.encounterCounts || {},
    playerHp: 30, // TODO: track persistent HP
    timestamp: Date.now(),
  };
  try {
    localStorage.setItem('matrimony_slot_' + slot, JSON.stringify(data));
    return true;
  } catch (e) { console.warn('Save failed:', e); return false; }
}

function loadGame(slot) {
  try {
    const raw = localStorage.getItem('matrimony_slot_' + slot);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { console.warn('Load failed:', e); return null; }
}

function getSaveInfo(slot) {
  const data = loadGame(slot);
  if (!data) return null;
  const location = (data.levelName || data.levelId || 'Unknown').replace(/_/g, ' ');
  return { location };
}

async function applySave(slot) {
  const data = loadGame(slot);
  if (!data) return false;
  // Load the saved level
  await loadLevel(data.levelId || null);
  state.player.x = data.playerX;
  state.player.y = data.playerY;
  state.facing = data.facing || 'down';
  state.inventory = data.inventory || [];
  state.actionOrder = data.actionOrder || null;
  state.flags = data.flags || {};
  state.openedChests = data.openedChests || {};
  state.defeatedEnemies = data.defeatedEnemies || {};
  state.encounterCounts = data.encounterCounts || {};
  state.smoothX = state.player.x;
  state.smoothY = state.player.y;
  state.footsteps = [];
  state.burnParticles = [];
  updateCamera();
  return true;
}

  wasWalking: false,

  // Combat
  combat: null, // { enemy, enemyHp, enemyMaxHp, enemyEff, enemyDef, enemyWait, playerHp, playerMaxHp, playerEff, playerDef, playerWait, attackText }
  combatTransition: null, // { type: 'in'|'out', startTime, duration }
};

// ══════════════════════════════════
// LOAD LEVEL
// ══════════════════════════════════
let ldtkData = null;
let currentLevelId = null;

async function loadLevel(levelIdentifier) {
  if (!ldtkData) {
    const resp = await fetch('LDtK_Matrimony/Matrimony.ldtk?v=' + Date.now());
    ldtkData = await resp.json();
  }
  const data = ldtkData;
  const level = levelIdentifier
    ? data.levels.find(l => l.identifier === levelIdentifier || l.iid === levelIdentifier)
    : data.levels[0];
  if (!level) { console.warn('Level not found:', levelIdentifier); return; }
  currentLevelId = level.iid;
  state.levelName = level.identifier || level.iid;
  
  // Load tileset image
  const tsDef = data.defs.tilesets[0];
  if (tsDef && tsDef.relPath) {
    tilesetCols = Math.floor(tsDef.pxWid / tsDef.tileGridSize);
    tilesetImg = new Image();
    tilesetImg.onload = () => { tilesetLoaded = true; };
    tilesetImg.src = 'LDtK_Matrimony/' + tsDef.relPath;
  }

  // Collect tile layers in reverse order (LDtk stores top-first, we want background drawn first)
  const tileLayers = [];
  
  for (const layer of level.layerInstances) {
    if (layer.__identifier === 'IntGrid') {
      state.mapW = Math.floor(level.pxWid / TILE);
      state.mapH = Math.floor(level.pxHei / TILE);
      state.collisionScale = 1;
      state.collision = [];
      for (let y = 0; y < layer.__cHei; y++) {
        const row = [];
        for (let x = 0; x < layer.__cWid; x++) {
          row.push(layer.intGridCsv[y * layer.__cWid + x]);
        }
        state.collision.push(row);
      }
    }
    if (layer.__identifier === 'IntGrid_Fine_Collision') {
      const colGridSize = layer.__gridSize || 8;
      state.fineCollisionScale = TILE / colGridSize; // e.g., 2
      state.fineCollision = [];
      for (let y = 0; y < layer.__cHei; y++) {
        const row = [];
        for (let x = 0; x < layer.__cWid; x++) {
          row.push(layer.intGridCsv[y * layer.__cWid + x]);
        }
        state.fineCollision.push(row);
      }
    }
    if (layer.__type === 'Tiles' && layer.gridTiles && layer.gridTiles.length > 0) {
      tileLayers.push(layer.gridTiles);
    }
    if (layer.__identifier === 'Entities') {
      state.entities = [];
      for (const e of layer.entityInstances) {
        const gx = Math.floor(e.px[0] / TILE);
        const gy = Math.floor(e.px[1] / TILE);
        if (e.__identifier === 'Main') {
          state.player.x = gx;
          state.player.y = gy;
        } else {
          state.entities.push({
            type: e.__identifier,
            x: gx, y: gy,
            origX: gx, origY: gy,
            id: `${e.__identifier}_${gx}_${gy}`,
            fields: e.fieldInstances ? Object.fromEntries(e.fieldInstances.map(f => [f.__identifier, f.__value])) : {},
          });
        }
      }
    }
  }
  
  // Reverse so background layers draw first
  tileLayers.reverse();
  state.tiles = tileLayers;
  
  // Clear defeated enemies for this level (they respawn on re-entry)
  for (const e of state.entities) {
    if (e.type !== 'Chest') {
      delete state.defeatedEnemies[e.id];
      e.deathAnim = null;
    }
  }
  
  updateCamera();
}

// ══════════════════════════════════
// CAMERA
// ══════════════════════════════════
function updateCamera() {
  state.smoothX = state.player.x;
  state.smoothY = state.player.y;
}

function getPlayerVisualPos() {
  if (state.flyTransition) {
    const ft = state.flyTransition;
    const t = Math.min(1, (performance.now() - ft.startTime) / ft.duration);
    const ease = t * t * (3 - 2 * t); // SmoothStep
    if (ft.type === 'takeoff') {
      // Circle outward while rising — like banking up
      const angle = ease * Math.PI * 2; // one full loop
      const radius = Math.sin(ease * Math.PI) * 0.4; // grows then shrinks
      return {
        x: ft.originX + Math.cos(angle) * radius,
        y: ft.originY + Math.sin(angle) * radius * 0.5 - ease * 0.3
      };
    } else {
      // Spiral down to target — tightening circle
      const spiral = (1 - ease) * Math.PI * 2;
      const radius = (1 - ease) * 0.5;
      const cx = ft.originX + (ft.targetX - ft.originX) * ease;
      const cy = ft.originY + (ft.targetY - ft.originY) * ease;
      return {
        x: cx + Math.cos(spiral) * radius,
        y: cy + Math.sin(spiral) * radius * 0.5 - (1 - ease) * 0.3
      };
    }
  }
  if (state.flying) {
    // Gentle bob while flying
    const bob = Math.sin(state.flyBobTimer / 400) * 0.08;
    return { x: state.flyX, y: state.flyY + bob };
  }
  if (!state.moving) return { x: state.player.x, y: state.player.y };
  const stepScale = state.moveStepScale || 1;
  let t = Math.min(1, state.moveTimer / ((state.lockedMoveDuration || getMoveDuration()) * stepScale));
  // Smooth easing on all movement: SmoothStep (3t²-2t³) for buttery interpolation
  // Extra SmoothStart on first run step to prevent visual snap
  if (state.justStartedRunning) {
    t = t * t; // SmoothStart for acceleration feel on walk→run transition only
  }
  // Linear interpolation for chained movement (no decel pulse between steps)
  return {
    x: state.moveFrom.x + (state.player.x - state.moveFrom.x) * t,
    y: state.moveFrom.y + (state.player.y - state.moveFrom.y) * t,
  };
}

function getCameraOffset() {
  const vis = getPlayerVisualPos();
  const viewW = CANVAS_W / (TILE * SCALE); // 20
  const viewH = CANVAS_H / (TILE * SCALE); // 15
  
  let camX, camY;
  
  // If map is smaller than viewport, center it
  if (state.mapW <= viewW) {
    camX = (state.mapW - viewW) / 2; // negative = centered
  } else {
    camX = vis.x - viewW / 2;
    camX = Math.max(0, Math.min(state.mapW - viewW, camX));
  }
  
  if (state.mapH <= viewH) {
    camY = (state.mapH - viewH) / 2;
  } else {
    camY = vis.y - viewH / 2;
    camY = Math.max(0, Math.min(state.mapH - viewH, camY));
  }
  
  return { x: camX, y: camY };
}

// ══════════════════════════════════
// INPUT
// ══════════════════════════════════
const keys = {};
document.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  
  // Splash screen — any key starts audio + transitions to title
  if (state.screen === 'splash') {
    const actx = getAudioCtx();
    if (actx) actx.resume();
    if (!titleMusicStarted) {
      titleMusic.play().then(() => { titleMusicStarted = true; }).catch(() => {});
    }
    state.screen = 'title';
    // Don't preventDefault on Meta to avoid OS shortcut issues, but still transition
    if (e.key !== 'Meta') e.preventDefault();
    return;
  }
  // If Meta was pressed on splash but music didn't start, retry on next key
  if (state.screen === 'title' && !titleMusicStarted) {
    const actx = getAudioCtx();
    if (actx) actx.resume();
    titleMusic.play().then(() => { titleMusicStarted = true; }).catch(() => {});
  }
  
  // Title screen input
  if (state.screen === 'title') {
    if (state.titleDeleteMode) {
      if (e.key === 'ArrowUp') {
        state.titleSelection = (state.titleSelection + 2) % 3;
        playTick();
      } else if (e.key === 'ArrowDown') {
        state.titleSelection = (state.titleSelection + 1) % 3;
        playTick();
      } else if (e.key === 'z' || e.key === 'Z') {
        // Delete the selected save
        const slot = state.titleSelection || 0;
        localStorage.removeItem('matrimony_slot_' + slot);
        playHit(true);
        state.titleDeleteMode = false;
      } else if (e.key === 'x' || e.key === 'X' || e.key === 'Escape') {
        state.titleDeleteMode = false;
        playTick();
      }
      e.preventDefault();
      return;
    }
    if (e.key === 'ArrowUp') {
      state.titleSelection = (state.titleSelection + 2) % 3;
      playTick();
      e.preventDefault();
    } else if (e.key === 'ArrowDown') {
      state.titleSelection = (state.titleSelection + 1) % 3;
      playTick();
      e.preventDefault();
    } else if (e.key === 'x' || e.key === 'X') {
      // Enter delete mode
      state.titleDeleteMode = true;
      playTick();
      e.preventDefault();
    } else if (e.key === 'z' || e.key === 'Z') {
      // Guard against multi-press during transition
      if (state.titleToGame) { e.preventDefault(); return; }
      // Start game — apply save immediately, then fade game in over title
      const slot = state.titleSelection || 0;
      const hasSave = loadGame(slot) !== null;
      if (hasSave) playChestOpen(); else playHit(true);
      (async () => {
        if (hasSave) await applySave(slot);
        state.titleToGame = { startTime: performance.now(), duration: 1200 };
        // Fade title music out over 1200ms transition
        const fadeStart = performance.now();
        const fadeInterval = setInterval(() => {
          const elapsed = performance.now() - fadeStart;
          const t = Math.min(1, elapsed / 1200);
          titleMusic.volume = 0.7 * (1 - t);
          if (t >= 1) {
            clearInterval(fadeInterval);
            titleMusic.pause();
            titleMusic.currentTime = 0;
            titleMusic.volume = 0.7;
          }
        }, 30);
        setTimeout(() => {
          state.screen = 'game';
          state.titleToGame = null;
        }, 1200);
      })();
      e.preventDefault();
    }
    return;
  }
  
  // ESC — exit combat after 3s
  // C key — toggle flight
  if (e.key === 'c' && state.screen === 'game' && !state.combat && !state.combatTransition && !state.dialogue && !state.inventoryOpen && state.canFly && !state.flyTransition) {
    if (!state.flying) {
      // Takeoff animation
      state.moving = false;
      const startFacingIdx = ['down', 'left', 'up', 'right'].indexOf(state.facing);
      state.flyTransition = {
        type: 'takeoff',
        startTime: performance.now(),
        duration: 500,
        originX: state.player.x,
        originY: state.player.y,
        startFacing: startFacingIdx >= 0 ? startFacingIdx : 0
      };
    } else {
      // Landing animation — spiral down to nearest tile
      const snapX = Math.round(state.flyX);
      const snapY = Math.round(state.flyY);
      if (!isTileBlocked(snapX, snapY, false)) {
        const startFacingIdx = ['down', 'left', 'up', 'right'].indexOf(state.facing);
        state.flyTransition = {
          type: 'landing',
          startTime: performance.now(),
          duration: 600,
          originX: state.flyX,
          originY: state.flyY,
          targetX: snapX,
          targetY: snapY,
          startFacing: startFacingIdx >= 0 ? startFacingIdx : 0
        };
      }
    }
    e.preventDefault();
    return;
  }

  if (e.key === 'Escape' && state.combat && !state.combatTransition) {
    if (performance.now() - state.combat.lastInputTime > 10000) {
      exitCombat(true);
    }
    return;
  }
  
  // Inventory navigation
  if (state.inventoryOpen && !state.combat) {
    // Save slot picker intercepts all input when open
    if (state.saveMenu) {
      if (e.key === 'ArrowUp') { state.saveMenu.selected = Math.max(0, state.saveMenu.selected - 1); playTick(); e.preventDefault(); return; }
      if (e.key === 'ArrowDown') { state.saveMenu.selected = Math.min(2, state.saveMenu.selected + 1); playTick(); e.preventDefault(); return; }
      if (e.key === 'z' || e.key === 'Z') {
        if (saveGame(state.saveMenu.selected)) {
          state.saveFeedback = { text: 'Saved to Slot ' + (state.saveMenu.selected + 1) + '!', startTime: performance.now(), duration: 1500 };
          playHit(false);
        }
        state.saveMenu = null;
        e.preventDefault(); return;
      }
      if (e.key === 'x' || e.key === 'X' || e.key === 'Escape') { state.saveMenu = null; e.preventDefault(); return; }
      e.preventDefault(); return;
    }
    const items = getInventoryActions();
    if (state.inventorySubMenu) {
      const subOpts = ['Lv Up', 'Order', 'Drop'];
      if (e.key === 'ArrowUp') { state.inventorySubSelected = Math.max(0, (state.inventorySubSelected || 0) - 1); e.preventDefault(); return; }
      if (e.key === 'ArrowDown') { state.inventorySubSelected = Math.min(subOpts.length - 1, (state.inventorySubSelected || 0) + 1); e.preventDefault(); return; }
    } else {
      const numItems = Math.min(items.length, 8);
      if (numItems > 0) {
        const sel = state.inventorySelected || 0;
        const col = sel % 2;
        const row = Math.floor(sel / 2);
        if (e.key === 'ArrowUp') { const nr = row - 1; if (nr >= 0) { const ni = nr * 2 + col; state.inventorySelected = ni < numItems ? ni : sel; } e.preventDefault(); return; }
        if (e.key === 'ArrowDown') { const nr = row + 1; const ni = nr * 2 + col; state.inventorySelected = ni < numItems ? ni : sel; e.preventDefault(); return; }
        if (e.key === 'ArrowLeft') { if (col === 1) { const ni = row * 2; state.inventorySelected = ni < numItems ? ni : sel; } e.preventDefault(); return; }
        if (e.key === 'ArrowRight') { if (col === 0) { const ni = row * 2 + 1; state.inventorySelected = ni < numItems ? ni : sel; } e.preventDefault(); return; }
      }
    }
  }

  // Combat input — depends on phase
  if (state.combat) {
    const c = state.combat;
    c.lastInputTime = performance.now();
    
    if (c.phase === 'target') {
      // Left/Right to toggle between enemy and self
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        c.targetSelf = !c.targetSelf;
        e.preventDefault(); return;
      }
    } else if (c.phase === 'action') {
      // Action selection phase — 2x4 grid navigation
      const numActions = Math.min((c.actions || []).length, 8);
      if (numActions > 0) {
        const sel = c.selectedAction || 0;
        const col = sel % 2;
        const row = Math.floor(sel / 2);
        if (e.key === 'ArrowUp') {
          const newRow = row - 1;
          if (newRow >= 0) { const newIdx = newRow * 2 + col; c.selectedAction = newIdx < numActions ? newIdx : sel; }
          e.preventDefault(); return;
        }
        if (e.key === 'ArrowDown') {
          const newRow = row + 1;
          const newIdx = newRow * 2 + col;
          c.selectedAction = newIdx < numActions ? newIdx : sel;
          e.preventDefault(); return;
        }
        if (e.key === 'ArrowLeft') {
          if (col === 1) { const newIdx = row * 2; c.selectedAction = newIdx < numActions ? newIdx : sel; }
          e.preventDefault(); return;
        }
        if (e.key === 'ArrowRight') {
          if (col === 0) { const newIdx = row * 2 + 1; c.selectedAction = newIdx < numActions ? newIdx : sel; }
          e.preventDefault(); return;
        }
      }
    }
  }
  
  // Chest interaction intercepts all input
  if (state.chestInteraction) {
    if (handleChestInput(e.key)) { e.preventDefault(); }
    return;
  }
  
  // Z = Confirm
  if (e.key === 'z' || e.key === 'Z') {
    e.preventDefault();
    if (state.inventoryOpen && !state.combat) {
      if (state.inventoryOrdering !== undefined) {
        // In order mode — swap the two items
        const items = getInventoryActions();
        const from = state.inventoryOrdering;
        const to = state.inventorySelected || 0;
        if (from !== to && from < items.length && to < items.length) {
          // Swap in the actual inventory/action list
          const actionList = state.actionOrder || items.slice();
          const tmp = actionList[from];
          actionList[from] = actionList[to];
          actionList[to] = tmp;
          state.actionOrder = actionList;
          playTick();
        }
        state.inventoryOrdering = undefined;
        return;
      }
      if (state.inventorySubMenu) {
        const subSel = state.inventorySubSelected || 0;
        if (subSel === 1) {
          // Order — enter ordering mode
          state.inventoryOrdering = state.inventorySelected || 0;
          state.inventorySubMenu = false;
          playTick();
        } else if (subSel === 2) {
          // Drop — remove item from inventory
          const items = getInventoryActions();
          const item = items[state.inventorySelected || 0];
          if (item) {
            // Remove from inventory
            const idx = state.inventory.indexOf(item);
            if (idx !== -1) state.inventory.splice(idx, 1);
            // Remove from actionOrder
            if (state.actionOrder) {
              const oi = state.actionOrder.indexOf(item);
              if (oi !== -1) state.actionOrder.splice(oi, 1);
            }
            playHit(false);
          }
          state.inventorySubMenu = false;
          // Clamp selection
          const newItems = getInventoryActions();
          if ((state.inventorySelected || 0) >= newItems.length) {
            state.inventorySelected = Math.max(0, newItems.length - 1);
          }
        } else {
          // Lv Up — placeholder
          state.inventorySubMenu = false;
        }
      } else {
        const items = getInventoryActions();
        if (items.length > 0) {
          state.inventorySubMenu = true;
          state.inventorySubSelected = 0;
        }
      }
      return;
    }
    if (state.combat) {
      const c = state.combat;
      // Win state — Z exits immediately
      if (c.winState) {
        // Start death animation on the enemy entity
        const ent = state.entities.find(en => en.id === c.enemy.id);
        if (ent) ent.deathAnim = { startTime: performance.now() };
        exitCombat();
        return;
      }
      if (c.phase === 'target') {
        // Confirm enemy target → move to action selection
        c.phase = 'action';
        c.selectedAction = 0;
      } else if (c.phase === 'action' && !c.waiting) {
        const action = (c.actions || [])[c.selectedAction || 0];
        if (action) {
          const act = COMBAT_ACTIONS[action] || {};
          c.waitCountdown = act.wait || 0;
          c.lastWaitTick = performance.now();
          c.waitAccumulator = 0;
          c.waiting = true;
          c.attackText = action;
          // If enemy has NO remaining countdown (resolved or fresh start), pick new action
          if (c.enemyWaitCountdown <= 0) {
            const enemyActions = ENEMY_DATA[c.enemy.type]?.actions || ['Stand Still', 'Do Nothing'];
            c.enemyAction = enemyActions[c.enemyActionIndex % enemyActions.length];
            c.enemyActionIndex++;
            const enemyAct = COMBAT_ACTIONS[c.enemyAction] || {};
            c.enemyWaitCountdown = enemyAct.wait || 0;
          }
          // Enemy resumes counting (frozen countdown resumes, or fresh one starts)
          c.enemyWaiting = true;
          c.enemyActionRevealed = true; // Always show enemy action after first commit
        }
      }
    } else if (state.dialogue) {
      closeDialogue();
    } else {
      interact();
    }
    return;
  }
  
  // Shift = Save (only inside inventory menu)
  if (e.key === 'Shift' && state.screen === 'game' && !state.combat && !state.dialogue && state.inventoryOpen) {
    e.preventDefault();
    if (state.saveMenu) {
      state.saveMenu = null;
    } else {
      state.saveMenu = { selected: 0 };
    }
    return;
  }
  
  // X = Cancel
  if (e.key === 'x' || e.key === 'X') {
    e.preventDefault();
    if (state.combat) {
      // No cancelling once committed — you're locked in
    } else if (state.inventoryOpen) {
      // Close inventory or back out of sub-menu/ordering
      if (state.inventoryOrdering !== undefined) {
        state.inventoryOrdering = undefined;
      } else if (state.inventorySubMenu) {
        state.inventorySubMenu = false;
      } else {
        state.inventoryOpen = false;
        state.saveMenu = null;
      }
    } else if (state.dialogue) {
      closeDialogue();
    } else if (!state.moving && !state.combatTransition) {
      // Open inventory
      state.inventoryOpen = true;
      state.inventorySelected = 0;
      state.inventorySubMenu = false;
      state.inventorySubSelected = 0;
    }
    return;
  }
});
document.addEventListener('keyup', (e) => {
  keys[e.key] = false;
  if (e.key === 'f' || e.key === 'F') state.showFontTest = !state.showFontTest;
  if (e.key === 'h' || e.key === 'H') state.showHitboxes = !state.showHitboxes;
  if (state.showFontTest && (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
    e.preventDefault();
    if (e.key === 'ArrowUp') state.fontTestScroll = Math.max(0, state.fontTestScroll - 20);
    if (e.key === 'ArrowDown') state.fontTestScroll = Math.min(Math.max(0, state.fontTestContentH - (canvas.height - 24)), state.fontTestScroll + 20);
    if (e.key === 'ArrowLeft') state.fontTestScrollX = Math.max(0, state.fontTestScrollX - 20);
    if (e.key === 'ArrowRight') state.fontTestScrollX = Math.min(state.fontTestContentW || 0, state.fontTestScrollX + 20);
    return;
  }
});

// ══════════════════════════════════
// SCREEN TRANSITIONS
// ══════════════════════════════════
async function doScreenTransition(targetLevelIid, fromDir) {
  state.transitioning = true;
  const fadeDuration = 150;
  
  // Fade out
  state.screenFade = { type: 'out', startTime: performance.now(), duration: fadeDuration };
  await new Promise(r => setTimeout(r, fadeDuration));
  
  // Save player position and level IID before loading new level
  const oldPlayerX = state.player.x;
  const oldPlayerY = state.player.y;
  const oldLevelIid = currentLevelId;
  
  // Clear particles from previous level
  state.burnParticles = [];
  
  // Load new level
  await loadLevel(targetLevelIid);
  
  // Get both level's world positions from LDtk data for exact alignment
  const oldLevel = ldtkData.levels.find(l => l.iid === oldLevelIid);
  const newLevel = ldtkData.levels.find(l => l.iid === targetLevelIid);
  
  if (oldLevel && newLevel) {
    // Convert player position to world coordinates (in tiles)
    const worldTileX = oldPlayerX + oldLevel.worldX / TILE;
    const worldTileY = oldPlayerY + oldLevel.worldY / TILE;
    
    // Convert to new level's local coordinates
    let newX = worldTileX - newLevel.worldX / TILE;
    let newY = worldTileY - newLevel.worldY / TILE;
    
    // Clamp to new level bounds and adjust for edge entry
    if (fromDir === 'e') newX = 0;
    else if (fromDir === 'w') newX = state.mapW - 1;
    else if (fromDir === 's') newY = 0;
    else if (fromDir === 'n') newY = state.mapH - 1;
    
    // Clamp the other axis
    newX = Math.max(0, Math.min(state.mapW - 1, Math.round(newX)));
    newY = Math.max(0, Math.min(state.mapH - 1, Math.round(newY)));
    
    // Find walkable tile near calculated position
    if (fromDir === 'e' || fromDir === 'w') {
      state.player.x = newX;
      state.player.y = findNearestWalkable(newX, newY, 'col');
    } else {
      state.player.y = newY;
      state.player.x = findNearestWalkable(newX, newY, 'row');
    }
  } else {
    // Fallback to old relative method
    const relY = oldPlayerY / state.mapH;
    const relX = oldPlayerX / state.mapW;
    if (fromDir === 'w') {
      state.player.x = state.mapW - 1;
      state.player.y = findNearestWalkable(state.mapW - 1, Math.round(relY * state.mapH), 'col');
    } else if (fromDir === 'e') {
      state.player.x = 0;
      state.player.y = findNearestWalkable(0, Math.round(relY * state.mapH), 'col');
    } else if (fromDir === 'n') {
      state.player.y = state.mapH - 1;
      state.player.x = findNearestWalkable(Math.round(relX * state.mapW), state.mapH - 1, 'row');
    } else if (fromDir === 's') {
      state.player.y = 0;
      state.player.x = findNearestWalkable(Math.round(relX * state.mapW), 0, 'row');
    }
  }
  
  state.smoothX = state.player.x;
  state.smoothY = state.player.y;
  // Sync flying position after level transition
  if (state.flying) { state.flyX = state.player.x; state.flyY = state.player.y; }
  state.footsteps = [];
  updateCamera();
  
  // Fade in
  state.screenFade = { type: 'in', startTime: performance.now(), duration: fadeDuration };
  await new Promise(r => setTimeout(r, fadeDuration));
  
  state.screenFade = null;
  state.transitioning = false;
}

// Check if placing a 1×1 tile hitbox at position (tx, ty) overlaps any collision
// tx, ty can be at half-tile increments (e.g., 3.5)
// The hitbox spans from (tx, ty) to (tx+1, ty+1)
function isTileBlocked(tx, ty, allowFly) {
  const s = state.fineCollisionScale || 2;
  // Fine cells the 1×1 hitbox covers: from (tx*s, ty*s) to ((tx+1)*s-1, (ty+1)*s-1)
  const fxStart = Math.floor(tx * s);
  const fyStart = Math.floor(ty * s);
  const fxEnd = Math.ceil((tx + 1) * s) - 1;
  const fyEnd = Math.ceil((ty + 1) * s) - 1;
  
  // Check coarse collision for all tiles the hitbox overlaps
  const txStart = Math.floor(tx), txEnd = Math.floor(tx + 0.999);
  const tyStart = Math.floor(ty), tyEnd = Math.floor(ty + 0.999);
  for (let cy = tyStart; cy <= tyEnd; cy++) {
    for (let cx = txStart; cx <= txEnd; cx++) {
      if (state.collision && state.collision[cy]) {
        const val = state.collision[cy][cx];
        if (val === 1) return true;
        if (val === 2 && !allowFly) return true;
      }
    }
  }
  
  // Check fine collision — all sub-cells the hitbox overlaps
  if (state.fineCollision) {
    for (let fy = fyStart; fy <= fyEnd; fy++) {
      for (let fx = fxStart; fx <= fxEnd; fx++) {
        if (!state.fineCollision[fy] || state.fineCollision[fy][fx] === undefined) continue;
        const val = state.fineCollision[fy][fx];
        if (val === 1) return true;
        if (val === 2 && !allowFly) return true;
      }
    }
  }
  return false;
}

// Check if a full tile position has ANY fine collision sub-cell blocked
function isTileFullyBlocked(tx, ty, allowFly) {
  return isTileBlocked(Math.floor(tx), Math.floor(ty), allowFly);
}

// Check if a full tile has ANY fine collision painted in it
function hasFineCollisionInTile(tx, ty) {
  if (!state.fineCollision) return false;
  const s = state.fineCollisionScale || 2;
  const cx = tx * s, cy = ty * s;
  for (let dy = 0; dy < s; dy++) {
    for (let dx = 0; dx < s; dx++) {
      const r = cy + dy, c = cx + dx;
      if (state.fineCollision[r] && state.fineCollision[r][c] > 0) return true;
    }
  }
  return false;
}

function findNearestWalkable(x, y, axis) {
  // Search nearby tiles for a walkable one
  const isWalkable = (r, c) => !isTileBlocked(c, r, state.flying);
  if (isWalkable(y, x)) return axis === 'col' ? y : x;
  for (let offset = 1; offset < 8; offset++) {
    if (axis === 'col') {
      if (y - offset >= 0 && isWalkable(y - offset, x)) return y - offset;
      if (y + offset < state.mapH && isWalkable(y + offset, x)) return y + offset;
    } else {
      if (x - offset >= 0 && isWalkable(y, x - offset)) return x - offset;
      if (x + offset < state.mapW && isWalkable(y, x + offset)) return x + offset;
    }
  }
  return axis === 'col' ? y : x; // fallback
}

function tryMove(dx, dy) {
  if (state.moving || state.dialogue || state.combat || state.combatTransition || state.inventoryOpen || state.chestInteraction || state.flying || state.flyTransition) return;
  
  // Set facing
  if (dx < 0) state.facing = 'left';
  if (dx > 0) state.facing = 'right';
  if (dy < 0) state.facing = 'up';
  if (dy > 0) state.facing = 'down';
  
  // Adaptive step: try full tile, fall back to half tile near fine collision
  const half = 1 / (state.fineCollisionScale || 2); // 0.5 for 8px grid
  const px = state.player.x, py = state.player.y;
  
  // Check if off-grid on the MOVEMENT axis
  const movingAxisVal = dx !== 0 ? px : py;
  const offGridOnMoveAxis = movingAxisVal % 1 !== 0;
  
  let nx, ny;
  if (offGridOnMoveAxis) {
    // Off-grid on movement axis — half step to re-align
    nx = px + dx * half; ny = py + dy * half;
  } else {
    // On-grid — try full step first
    nx = px + dx; ny = py + dy;
  }
  
  // Bounds check — trigger screen transition if neighbour exists
  // Only check from full tile positions (round to nearest tile for bounds)
  const bnx = Math.floor(nx), bny = Math.floor(ny);
  if (bnx < 0 || bnx >= state.mapW || bny < 0 || bny >= state.mapH) {
    if (state.transitioning) return;
    // Determine direction
    let dir = null;
    if (nx < 0) dir = 'w';
    else if (nx >= state.mapW) dir = 'e';
    else if (ny < 0) dir = 'n';
    else if (ny >= state.mapH) dir = 's';
    // Find neighbour
    if (dir && ldtkData && currentLevelId) {
      const curLevel = ldtkData.levels.find(l => l.iid === currentLevelId);
      if (curLevel) {
        // Filter all neighbours in this direction
        const nbs = (curLevel.__neighbours || []).filter(n => n.dir === dir);
        if (nbs.length === 1) {
          doScreenTransition(nbs[0].levelIid, dir);
        } else if (nbs.length > 1) {
          // Multiple neighbours — pick the one whose world position best matches player's current position
          const playerWorldX = state.player.x * TILE + curLevel.worldX;
          const playerWorldY = state.player.y * TILE + curLevel.worldY;
          let best = nbs[0], bestDist = Infinity;
          for (const n of nbs) {
            const nl = ldtkData.levels.find(l => l.iid === n.levelIid);
            if (!nl) continue;
            // Check overlap on the perpendicular axis
            let dist;
            if (dir === 'e' || dir === 'w') {
              // Match Y axis
              const nlTop = nl.worldY;
              const nlBot = nl.worldY + nl.pxHei;
              const py = playerWorldY;
              dist = py < nlTop ? nlTop - py : py >= nlBot ? py - nlBot + 1 : 0;
            } else {
              // Match X axis
              const nlLeft = nl.worldX;
              const nlRight = nl.worldX + nl.pxWid;
              const px = playerWorldX;
              dist = px < nlLeft ? nlLeft - px : px >= nlRight ? px - nlRight + 1 : 0;
            }
            if (dist < bestDist) { bestDist = dist; best = n; }
          }
          doScreenTransition(best.levelIid, dir);
        }
      }
    }
    return;
  }
  // Collision check with adaptive step
  if (isTileBlocked(nx, ny, state.flying)) {
    if (!offGridOnMoveAxis && state.fineCollision) {
      // Full step blocked — try half step
      const halfNx = px + dx * half, halfNy = py + dy * half;
      if (!isTileBlocked(halfNx, halfNy, state.flying)) {
        nx = halfNx; ny = halfNy;
      } else {
        return;
      }
    } else {
      return;
    }
  }
  
  // Entity collision — check 1×1 box overlap
  const blocking = state.entities.find(e => {
    if (state.defeatedEnemies[e.id] || e.deathAnim) return false;
    // Player box: (nx, ny) to (nx+1, ny+1). Entity box: (e.x, e.y) to (e.x+1, e.y+1)
    return nx < e.x + 1 && nx + 1 > e.x && ny < e.y + 1 && ny + 1 > e.y;
  });
  if (blocking) {
    state.facing = dx > 0 ? 'right' : dx < 0 ? 'left' : dy > 0 ? 'down' : 'up';
    // Enemies trigger combat on contact (no Z needed)
    if (blocking.type !== 'Chest') {
      handleEntityContact(blocking);
    }
    return;
  }
  
  // Start movement
  state.wasWalking = !keys['Shift'];
  state.moving = true;
  state.moveTimer = 0;
  // Momentum: blend toward target duration instead of snapping (prevents Shift-spam jitter)
  const targetDuration = getMoveDuration();
  state.currentMoveDuration += (targetDuration - state.currentMoveDuration) * 0.4;
  state.lockedMoveDuration = Math.round(state.currentMoveDuration);
  state.moveFrom.x = state.player.x;
  state.moveFrom.y = state.player.y;
  // Scale duration by step size (half step = half duration)
  const stepSize = Math.max(Math.abs(nx - px), Math.abs(ny - py));
  state.moveStepScale = stepSize; // store for duration scaling
  // Leave a footstep at the position we're leaving
  state.footsteps.push({ x: state.moveFrom.x, y: state.moveFrom.y, time: performance.now(), side: state.footsteps.length % 2 });
  if (state.footsteps.length > 12) state.footsteps.shift();
  state.player.x = nx;
  state.player.y = ny;
  // Only play footstep if a direction key is currently held
  if (keys['ArrowLeft'] || keys['ArrowRight'] || keys['ArrowUp'] || keys['ArrowDown']) {
    playFootstep();
  }
}

const MOVE_DURATION = 230; // ms for grid movement
const RUN_DURATION = 130; // ms for running (Shift held)
function getMoveDuration() { return keys['Shift'] ? RUN_DURATION : MOVE_DURATION; }
let lastFrameTime = 0;

function handleMovement(now) {
  const dt = lastFrameTime ? Math.min(now - lastFrameTime, 50) : 16; // cap to avoid jumps on tab-back
  lastFrameTime = now;

  // Fly transition animations (takeoff / landing)
  if (state.flyTransition) {
    const ft = state.flyTransition;
    const elapsed = now - ft.startTime;
    if (elapsed >= ft.duration) {
      if (ft.type === 'takeoff') {
        state.flying = true;
        state.flyX = ft.originX;
        state.flyY = ft.originY;
        state.flyVx = 0;
        state.flyVy = 0;
        state.flyBobTimer = 0;
      } else if (ft.type === 'landing') {
        state.flying = false;
        state.player.x = ft.targetX;
        state.player.y = ft.targetY;
        state.flyX = 0;
        state.flyY = 0;
        // Landing dust puff
        for (let d = 0; d < 8; d++) {
          const angle = (d / 8) * Math.PI * 2;
          state.burnParticles.push({
            x: ft.targetX + 0.5 + Math.cos(angle) * 0.3,
            y: ft.targetY + 0.8 + Math.sin(angle) * 0.15,
            vx: Math.cos(angle) * 0.3,
            vy: Math.sin(angle) * 0.1 - 0.1,
            life: 1.0, initialLife: 1.0, size: 2, dust: true
          });
        }
      }
      // Restore original facing
      const dirs = ['down', 'left', 'up', 'right'];
      state.facing = dirs[ft.startFacing || 0];
      state.flyTransition = null;
    } else {
      // Cycle facing — fast spins that decelerate, then hold final facing
      const ft2 = state.flyTransition;
      const t2 = Math.min(1, (now - ft2.startTime) / ft2.duration);
      const dirs = ['down', 'left', 'up', 'right'];
      const startIdx = ft2.startFacing || 0;
      // Spin fills first 75% of duration, last 25% holds final facing
      const spinT = Math.min(1, t2 / 0.75);
      const eased = 1 - (1 - spinT) * (1 - spinT) * (1 - spinT);
      const totalSteps = 12; // 3 full rotations — ends back on start
      state.facing = dirs[(startIdx + Math.floor(eased * totalSteps)) % 4];
    }
    return; // block all movement during transition
  }

  // Flying mode — velocity-based 8-way movement with momentum
  if (state.flying) {
    // Block flight input during inventory/dialogue/combat
    if (state.inventoryOpen || state.dialogue || state.combat || state.combatTransition) {
      // Still apply drag so you slow to a stop
      state.flyVx *= 0.92;
      state.flyVy *= 0.92;
      if (Math.abs(state.flyVx) < 0.0001) state.flyVx = 0;
      if (Math.abs(state.flyVy) < 0.0001) state.flyVy = 0;
      state.flyX += state.flyVx * dt;
      state.flyY += state.flyVy * dt;
      state.player.x = state.flyX;
      state.player.y = state.flyY;
      state.flyBobTimer += dt;
      return;
    }
    state.flyBobTimer += dt;
    const maxSpeed = keys['Shift'] ? 0.009 : 0.006;
    const accel = 0.00003; // acceleration per ms
    const drag = 0.96; // velocity multiplier per frame (applied each tick)
    let fdx = 0, fdy = 0;
    if (keys['ArrowLeft']) { fdx -= 1; state.facing = 'left'; }
    if (keys['ArrowRight']) { fdx += 1; state.facing = 'right'; }
    if (keys['ArrowUp']) { fdy -= 1; state.facing = 'up'; }
    if (keys['ArrowDown']) { fdy += 1; state.facing = 'down'; }
    // Normalize diagonal input
    if (fdx !== 0 && fdy !== 0) {
      const norm = 1 / Math.sqrt(2);
      fdx *= norm;
      fdy *= norm;
    }
    // Apply acceleration
    state.flyVx += fdx * accel * dt;
    state.flyVy += fdy * accel * dt;
    // Clamp to max speed
    const speed = Math.sqrt(state.flyVx * state.flyVx + state.flyVy * state.flyVy);
    if (speed > maxSpeed) {
      state.flyVx *= maxSpeed / speed;
      state.flyVy *= maxSpeed / speed;
    }
    // Apply drag (stronger when no input for quick-ish stop)
    const dragMul = (fdx === 0 && fdy === 0) ? 0.92 : drag;
    state.flyVx *= dragMul;
    state.flyVy *= dragMul;
    // Kill tiny velocities
    if (Math.abs(state.flyVx) < 0.0001) state.flyVx = 0;
    if (Math.abs(state.flyVy) < 0.0001) state.flyVy = 0;
    const newFlyX = state.flyX + state.flyVx * dt;
    const newFlyY = state.flyY + state.flyVy * dt;
    // Boundary check — trigger screen transition if at map edge
    if ((newFlyX < -0.5 || newFlyX >= state.mapW - 0.5 ||
         newFlyY < -0.5 || newFlyY >= state.mapH - 0.5) && !state.transitioning) {
      let dir = null;
      if (newFlyX < -0.5) dir = 'w';
      else if (newFlyX >= state.mapW - 0.5) dir = 'e';
      else if (newFlyY < -0.5) dir = 'n';
      else if (newFlyY >= state.mapH - 0.5) dir = 's';
      if (dir && typeof ldtkData !== 'undefined' && typeof currentLevelId !== 'undefined' && currentLevelId) {
        const curLevel = ldtkData.levels.find(l => l.iid === currentLevelId);
        if (curLevel) {
          const nbs = (curLevel.__neighbours || []).filter(n => n.dir === dir);
          if (nbs.length >= 1) {
            // Pick best match
            let best = nbs[0];
            if (nbs.length > 1) {
              const playerWorldX = state.flyX * 16 + curLevel.worldX;
              const playerWorldY = state.flyY * 16 + curLevel.worldY;
              let bestDist = Infinity;
              for (const n of nbs) {
                const nl = ldtkData.levels.find(l => l.iid === n.levelIid);
                if (!nl) continue;
                let dist;
                if (dir === 'e' || dir === 'w') {
                  const py = playerWorldY;
                  dist = py < nl.worldY ? nl.worldY - py : py >= nl.worldY + nl.pxHei ? py - nl.worldY - nl.pxHei + 1 : 0;
                } else {
                  const px = playerWorldX;
                  dist = px < nl.worldX ? nl.worldX - px : px >= nl.worldX + nl.pxWid ? px - nl.worldX - nl.pxWid + 1 : 0;
                }
                if (dist < bestDist) { bestDist = dist; best = n; }
              }
            }
            doScreenTransition(best.levelIid, dir);
          }
        }
      }
      return;
    }
    if (newFlyX >= -0.5 && newFlyX < state.mapW - 0.5 &&
        newFlyY >= -0.5 && newFlyY < state.mapH - 0.5) {
      state.flyX = newFlyX;
      state.flyY = newFlyY;
    }
    state.player.x = state.flyX;
    state.player.y = state.flyY;
    return;
  }

  if (state.moving) {
    state.moveTimer += dt;
    const stepScale = state.moveStepScale || 1;
    if (state.moveTimer >= (state.lockedMoveDuration || getMoveDuration()) * stepScale) {
      state.moving = false;
      state.justStartedRunning = state.wasWalking && keys['Shift'];
      // Chain movement immediately if key held — no gap between steps
      if (keys['ArrowLeft']) tryMove(-1, 0);
      else if (keys['ArrowRight']) tryMove(1, 0);
      else if (keys['ArrowUp']) tryMove(0, -1);
      else if (keys['ArrowDown']) tryMove(0, 1);
    }
    return;
  }

  if (keys['ArrowLeft']) tryMove(-1, 0);
  else if (keys['ArrowRight']) tryMove(1, 0);
  else if (keys['ArrowUp']) tryMove(0, -1);
  else if (keys['ArrowDown']) tryMove(0, 1);
}

// ══════════════════════════════════
// INTERACTION
// ══════════════════════════════════
function getFacingTile() {
  const dx = state.facing === 'left' ? -1 : state.facing === 'right' ? 1 : 0;
  const dy = state.facing === 'up' ? -1 : state.facing === 'down' ? 1 : 0;
  return { x: state.player.x + dx, y: state.player.y + dy };
}

function interact() {
  const { x, y } = getFacingTile();
  // Use AABB overlap: player facing tile is (x,y) to (x+1,y+1), entity is (e.x,e.y) to (e.x+1,e.y+1)
  const entity = state.entities.find(e => !state.defeatedEnemies[e.id] && x < e.x + 1 && x + 1 > e.x && y < e.y + 1 && y + 1 > e.y);
  if (entity) {
    handleEntityContact(entity);
  }
}

// Enemy dialogue — cycles through on each encounter
// Load enemy dialogue from editor data (localStorage or Firebase)
function loadEditorDialogue() {
  try {
    const editorData = JSON.parse(localStorage.getItem('matrimony_editor_data'));
    if (editorData && editorData.enemies) {
      const dialogueMap = {};
      for (const enemy of editorData.enemies) {
        if (enemy.dialogue && enemy.dialogue.length > 0) {
          dialogueMap[enemy.sprite] = enemy.dialogue.map(encounter => {
            const parts = encounter.split('|').map(s => s.trim()).filter(Boolean);
            return parts.map((text, i) => ({
              speaker: i % 2 === 0 ? enemy.name : 'You',
              text: text
            }));
          });
        }
      }
      return dialogueMap;
    }
  } catch(e) {}
  return {};
}
let ENEMY_DIALOGUE = loadEditorDialogue();
if (!state.encounterCounts) state.encounterCounts = {};

function handleEntityContact(entity) {
  if (entity.type === 'Enemy1') {
    const data = ENEMY_DATA['Enemy1'];
    const dialogues = ENEMY_DIALOGUE['Enemy1'];
    if (dialogues) {
      const count = state.encounterCounts['Enemy1'] || 0;
      const lines = dialogues[Math.min(count, dialogues.length - 1)];
      state.encounterCounts['Enemy1'] = count + 1;
      // Queue dialogue lines, then start combat after last one
      state.dialogueQueue = lines.slice(1).map(l => ({ speaker: l.speaker, text: l.text, portrait: l.speaker === 'You' ? 'player' : 'Enemy1' }));
      state.pendingCombat = { entity, data };
      showDialogue(lines[0].speaker, lines[0].text, lines[0].speaker === 'You' ? 'player' : 'Enemy1');
    } else {
      startCombat(entity, data);
    }
  } else if (entity.type === 'Chest') {
    if (!state.openedChests[entity.id]) {
      const item = entity.fields.Item || 'Shortbow';
      playChestOpen();
      state.chestInteraction = { step: 'reveal', item: item, entityId: entity.id };
    } else {
      showDialogue('', 'The chest is empty.');
    }
  } else {
    showDialogue('', 'Nothing happens.');
  }
}

// ══════════════════════════════════
// COMBAT SYSTEM
// ══════════════════════════════════
const ENEMY_DATA = {
  'Enemy1': {
    name: 'Fire Elemental',
    sprite: 'Enemy1',
    maxHp: 220, eff: 10, def: 2, wait: 12,
    actions: ['Charging...', 'Fire Punch'],
    startsWithCharge: true,
  },
};

// Battle music
const battleMusic = new Audio('sounds/battle.mp3');
battleMusic.loop = true;
battleMusic.volume = 0.30;

// Title music
const titleMusic = new Audio('sounds/title.mp3');
titleMusic.loop = true;
titleMusic.volume = 0.7;
let titleMusicStarted = false;

function startCombat(entity, enemyStats) {
  playBattleStart();
  state.screenFlash = { startTime: performance.now(), duration: 300 };
  battleMusic.currentTime = 0;
  battleMusic.play().catch(() => {});
  state.combat = {
    enemy: entity,
    enemyName: enemyStats.name || entity.type,
    enemySprite: entity.type,
    enemyHp: enemyStats.maxHp,
    enemyMaxHp: enemyStats.maxHp,
    enemyDisplayHp: enemyStats.maxHp,
    enemyEff: enemyStats.eff,
    enemyDef: enemyStats.def,
    enemyWait: enemyStats.wait,
    playerHp: 30,
    playerMaxHp: 30,
    playerEff: 10,
    playerDef: 2,
    playerWait: 0,
    attackText: '',
    startTime: performance.now(),
    slideInDuration: 500,
    phase: 'action', // skip target phase — single enemy, go straight to action select
    targetSelf: false,
    selectedEnemy: 0,
    actions: ['Punch', 'Kick', 'Defend', ...(state.inventory.includes('Shortbow') ? ['Shortbow'] : [])],
    selectedAction: 0,
    waitCountdown: -1, // player wait: -1 = not counting, >=0 = ticking down
    waitTickSpeed: 240, // ms per tick
    lastWaitTick: 0,
    waitAccumulator: 0, // accumulator for precise ticking
    waiting: false, // true while player wait is counting down
    // Enemy action state
    enemyAction: null, // name of enemy's chosen action
    enemyWaitCountdown: -1,
    enemyWaiting: false,
    enemyActionIndex: 1, // start at 1 because we set initial action to index 0 (Charging)
    // Attack animation
    playerAttackAnim: null, // { startTime, duration, phase: 'rush'|'hit'|'return' }
    enemyAttackAnim: null, // enemy rush toward player animation
    enemyActionRevealed: false, // enemy action visible after first exchange
    lastInputTime: performance.now(), // track idle for Esc hint
  };
  // Enemy always starts with first action (Charging for Fire Elemental)
  const c = state.combat;
  const initialActions = ENEMY_DATA[c.enemy.type]?.actions || ['Stand Still'];
  c.enemyAction = initialActions[0];
  const initAct = COMBAT_ACTIONS[c.enemyAction] || {};
  c.enemyWaitCountdown = initAct.wait || 5;
  c.enemyWaiting = true;
  c.lastEnemyWaitTick = performance.now();
}

function exitCombat(ranAway) {
  const enemy = state.combat.enemy;
  battleMusic.pause();
  battleMusic.currentTime = 0;
  if (ranAway && enemy) {
    // Mark enemy as fled — disappears until level re-entry
    state.defeatedEnemies[enemy.id] = true;
    // Start a quick fade-out (no flash, just fade)
    const ent = state.entities.find(e => e.id === enemy.id);
    if (ent) {
      ent.deathAnim = { startTime: performance.now() - 1200 }; // Skip flash phase, go straight to fade
    }
  }
  state.combat = null;
}

// Combat action data
const COMBAT_ACTIONS = {
  'Punch':    { eff: 8, def: 4, wait: 4 },
  'Kick':     { eff: 12, def: 1, wait: 5 },
  'Shortbow': { eff: 10, def: 2, wait: 3 },
  'Defend':   { eff: 0, def: 10, wait: 9 },
  'Stand Still': { eff: 0, def: 0, wait: 10 },
  'Do Nothing':  { eff: 0, def: 0, wait: 10 },
  'Charging...': { eff: 0, def: 4, wait: 6 },
  'Fire Punch':  { eff: 10, def: 2, wait: 12 },
};

// ── Load editor overrides from localStorage ──
(function loadEditorData() {
  try {
    const ed = JSON.parse(localStorage.getItem('matrimony_editor_data'));
    if (!ed) return;
    // Override weapons/actions
    if (ed.weapons) {
      for (const w of ed.weapons) {
        if (w.name) COMBAT_ACTIONS[w.name] = { eff: w.eff||0, def: w.def||0, wait: w.wait||0 };
      }
    }
    // Override enemies
    if (ed.enemies) {
      for (const e of ed.enemies) {
        if (!e.sprite) continue;
        const actionNames = (e.actions||[]).map(a => {
          const name = typeof a === 'string' ? a : a.name;
          // Also register enemy action stats
          if (typeof a === 'object' && a.name) {
            COMBAT_ACTIONS[a.name] = { eff: a.eff||0, def: a.def||0, wait: a.wait||0 };
          }
          return name;
        });
        ENEMY_DATA[e.sprite] = {
          name: e.name || e.sprite,
          sprite: e.sprite,
          maxHp: e.maxHp || 100,
          actions: actionNames,
          startsWithCharge: e.startsWithCharge || false,
        };
      }
    }
    console.log('[Editor] Loaded overrides:', ed.weapons?.length, 'weapons,', ed.enemies?.length, 'enemies');
  } catch (e) { console.warn('[Editor] Failed to load:', e); }
})();

// Mouse state for combat menu
const mouse = { x: 0, y: 0 };
canvas.addEventListener('wheel', (e) => {
  if (state.showFontTest) { e.preventDefault(); if (e.shiftKey || Math.abs(e.deltaX) > Math.abs(e.deltaY)) { state.fontTestScrollX += (e.deltaX || e.deltaY) > 0 ? 10 : -10; state.fontTestScrollX = Math.max(0, Math.min(state.fontTestScrollX, state.fontTestContentW || 0)); } else { state.fontTestScroll += e.deltaY > 0 ? 10 : -10; state.fontTestScroll = Math.max(0, Math.min(state.fontTestScroll, Math.max(0, state.fontTestContentH - (canvas.height - 24)))); } }
}, { passive: false });
canvas.addEventListener('mousedown', (e) => {
  if (!state.showFontTest) return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);
  // Check if click is near scrollbar area (right 12px of panel)
  if (mx >= canvas.width - 22) {
    state.fontTestDragging = true;
    state.fontTestDragStartY = my;
    state.fontTestDragStartScroll = state.fontTestScroll;
  }
});
canvas.addEventListener('mousemove', (e) => {
  if (!state.fontTestDragging) return;
  const rect = canvas.getBoundingClientRect();
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);
  const panelH = canvas.height - 24;
  const contentH = state.fontTestContentH;
  const maxScroll = Math.max(0, contentH - panelH);
  const dragRatio = (my - state.fontTestDragStartY) / panelH;
  state.fontTestScroll = Math.max(0, Math.min(maxScroll, state.fontTestDragStartScroll + dragRatio * contentH));
});
document.addEventListener('mouseup', () => { state.fontTestDragging = false; });
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
  mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
});
canvas.addEventListener('click', (e) => {
  if (state.screen === 'splash') {
    const actx = getAudioCtx();
    if (actx) actx.resume();
    if (!titleMusicStarted) {
      titleMusic.play().then(() => { titleMusicStarted = true; }).catch(() => {});
    }
    state.screen = 'title';
    return;
  }
  if (state.screen === 'title' && !titleMusicStarted) {
    titleMusic.play().then(() => { titleMusicStarted = true; }).catch(() => {});
  }
  if (!state.combat) return;
  const c = state.combat;
  
  if (c.phase === 'target') {
    // Click on enemy in arena to confirm target
    c.phase = 'action';
    c.selectedAction = 0;
    return;
  }
  
  if (c.phase === 'action') {
    const actions = c.actions || [];
    const W = canvas.width;
    const H = canvas.height;
    const topH = Math.round(H * 0.10);
    const arenaH = Math.round(H * 0.42);
    const botContentY = topH + arenaH;
    const botH = H - botContentY;
    const pad = 8;
    const portraitH = Math.round(topH * 0.7) - 8;
    const portraitW = Math.round(portraitH * 2.5);
    const pPortraitY = botContentY + pad + 2;
    const portraitCenterY = pPortraitY + Math.round(portraitH / 2);
    const gridX = pad + 12 + portraitW + 16;
    const gridRowH = 20;
    const gridTotalH = 4 * gridRowH;
    const gridY = portraitCenterY - Math.round(gridTotalH / 2);
    const colW = Math.round((W - gridX - 16) / 2);
    for (let i = 0; i < actions.length && i < 8; i++) {
      const col = i < 4 ? 0 : 1;
      const row = i < 4 ? i : i - 4;
      const ax = gridX + col * colW;
      const ay = gridY + row * gridRowH;
      if (mouse.x >= ax && mouse.x <= ax + colW && mouse.y >= ay && mouse.y <= ay + gridRowH) {
        c.selectedAction = i;
        c.firstAttackDone = true;
        c.attackText = actions[i];
        break;
      }
    }
  }
});

// CRISP TEXT RENDERING
// ══════════════════════════════════
const CRISP_THRESHOLD = 220;
const CRISP_FONT = 'RM2000';
const CRISP_FONT_ALT = 'RM2000Alt';
const CRISP_SIZE = 12;

function crispText(text, x, y, size, color, spacing, fontOverride) {
  if (!crispText._c) {
    crispText._c = document.createElement('canvas');
    crispText._ctx = crispText._c.getContext('2d', { willReadFrequently: true });
    crispText._c2 = document.createElement('canvas');
    crispText._ctx2 = crispText._c2.getContext('2d', { willReadFrequently: true });
  }
  const fs = size || CRISP_SIZE;
  const sp = spacing != null ? spacing : 0;
  const ff = fontOverride || CRISP_FONT;
  const oc = crispText._c, octx = crispText._ctx;
  const w = 700, h = fs + 8;
  oc.width = w; oc.height = h;
  octx.clearRect(0, 0, w, h);
  octx.font = fs + 'px "' + ff + '"';
  octx.textAlign = 'left'; octx.textBaseline = 'top';
  octx.fillStyle = '#ffffff';
  let tx = 2;
  for (let i = 0; i < text.length; i++) { octx.fillText(text[i], tx, 2); tx += octx.measureText(text[i]).width + sp; }
  const imgData = octx.getImageData(0, 0, tx + 2, h);
  for (let i = 3; i < imgData.data.length; i += 4) imgData.data[i] = imgData.data[i] >= CRISP_THRESHOLD ? 255 : 0;
  octx.putImageData(imgData, 0, 0);
  octx.globalCompositeOperation = 'source-atop';
  octx.fillStyle = color || '#e8e0d0';
  octx.fillRect(0, 0, tx + 2, h);
  octx.globalCompositeOperation = 'source-over';
  const sc = crispText._c2, sctx = crispText._ctx2;
  sc.width = w; sc.height = h;
  sctx.clearRect(0, 0, w, h);
  sctx.font = fs + 'px "' + ff + '"';
  sctx.textAlign = 'left'; sctx.textBaseline = 'top';
  sctx.fillStyle = '#ffffff';
  let stx = 2;
  for (let i = 0; i < text.length; i++) { sctx.fillText(text[i], stx, 2); stx += sctx.measureText(text[i]).width + sp; }
  const sData = sctx.getImageData(0, 0, stx + 2, h);
  for (let i = 3; i < sData.data.length; i += 4) sData.data[i] = sData.data[i] >= CRISP_THRESHOLD ? 255 : 0;
  for (let i = 0; i < sData.data.length; i += 4) { sData.data[i] = 0; sData.data[i+1] = 0; sData.data[i+2] = 0; }
  sctx.putImageData(sData, 0, 0);
  ctx.drawImage(sc, 0, 0, stx + 2, h, x + 2, y + 2, stx + 2, h);
  ctx.drawImage(oc, 0, 0, tx + 2, h, x, y, tx + 2, h);
  return tx;
}

function crispGradientText(text, x, y, size, stops, spacing, fontOverride) {
  if (!crispGradientText._c) {
    crispGradientText._c = document.createElement('canvas');
    crispGradientText._ctx = crispGradientText._c.getContext('2d', { willReadFrequently: true });
    crispGradientText._c2 = document.createElement('canvas');
    crispGradientText._ctx2 = crispGradientText._c2.getContext('2d', { willReadFrequently: true });
  }
  const fs = size || CRISP_SIZE;
  const sp = spacing != null ? spacing : 0;
  const ff = fontOverride || CRISP_FONT;
  const oc = crispGradientText._c, octx = crispGradientText._ctx;
  const w = 700, h = fs + 8;
  oc.width = w; oc.height = h;
  octx.clearRect(0, 0, w, h);
  octx.font = fs + 'px "' + ff + '"';
  octx.textAlign = 'left'; octx.textBaseline = 'top';
  octx.fillStyle = '#ffffff';
  let tx = 2;
  for (let i = 0; i < text.length; i++) { octx.fillText(text[i], tx, 2); tx += octx.measureText(text[i]).width + sp; }
  const imgData = octx.getImageData(0, 0, tx + 2, h);
  for (let i = 3; i < imgData.data.length; i += 4) imgData.data[i] = imgData.data[i] >= CRISP_THRESHOLD ? 255 : 0;
  octx.putImageData(imgData, 0, 0);
  octx.globalCompositeOperation = 'source-atop';
  const grad = octx.createLinearGradient(0, 0, 0, h);
  for (const [pos, col] of stops) grad.addColorStop(pos, col);
  octx.fillStyle = grad;
  octx.fillRect(0, 0, tx + 2, h);
  octx.globalCompositeOperation = 'source-over';
  const sc = crispGradientText._c2, sctx = crispGradientText._ctx2;
  sc.width = w; sc.height = h;
  sctx.clearRect(0, 0, w, h);
  sctx.font = fs + 'px "' + ff + '"';
  sctx.textAlign = 'left'; sctx.textBaseline = 'top';
  sctx.fillStyle = '#ffffff';
  let stx = 2;
  for (let i = 0; i < text.length; i++) { sctx.fillText(text[i], stx, 2); stx += sctx.measureText(text[i]).width + sp; }
  const sData = sctx.getImageData(0, 0, stx + 2, h);
  for (let i = 3; i < sData.data.length; i += 4) sData.data[i] = sData.data[i] >= CRISP_THRESHOLD ? 255 : 0;
  for (let i = 0; i < sData.data.length; i += 4) { sData.data[i] = 0; sData.data[i+1] = 0; sData.data[i+2] = 0; }
  sctx.putImageData(sData, 0, 0);
  ctx.drawImage(sc, 0, 0, stx + 2, h, x + 2, y + 2, stx + 2, h);
  ctx.drawImage(oc, 0, 0, tx + 2, h, x, y, tx + 2, h);
  return tx;
}

const GOLD_GRADIENT = [[0, '#f0d060'], [0.4, '#ffe8a0'], [0.6, '#ffe8a0'], [1, '#c89830']];

// Draw a gold gradient outline rect
function drawGoldOutline(x, y, w, h, thickness) {
  const t = thickness || 3;
  const grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, '#f0d060');
  grad.addColorStop(0.3, '#ffe8a0');
  grad.addColorStop(0.7, '#ffe8a0');
  grad.addColorStop(1, '#c89830');
  ctx.strokeStyle = grad;
  ctx.lineWidth = t;
  ctx.strokeRect(x, y, w, h);
}

function getInventoryActions() {
  // All combat actions the player currently has
  const base = ['Punch', 'Kick', 'Defend', ...(state.inventory.includes('Shortbow') ? ['Shortbow'] : [])];
  if (state.actionOrder) {
    // Filter out any actions no longer available, preserve order
    return state.actionOrder.filter(a => base.includes(a));
  }
  return base;
}

function drawInventory() {
  const W = canvas.width;
  const H = canvas.height;
  const now = performance.now();
  
  const topH = Math.round(H * 0.16);
  const botContentY = Math.round(H * 0.52);
  const botH = H - botContentY;
  const portraitH = Math.round(topH * 0.42);
  const portraitW = Math.round(portraitH * 3.5);
  const pad = 8;
  
  // ── TOP BAR (semi-transparent, no opaque arena) ──
  ctx.fillStyle = 'rgba(8, 8, 14, 0.90)';
  ctx.fillRect(0, 0, W, topH);
  ctx.strokeStyle = 'rgba(200, 200, 200, 0.45)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, topH - 0.5); ctx.lineTo(W, topH - 0.5); ctx.stroke();
  
  // EXP display
  crispText('EXP: 0', pad + 8, Math.round(topH / 2) - 10, 32, '#e8e0d0', 0, CRISP_FONT_ALT);
  crispText('Shift : Save', W - pad - 170, Math.round(topH / 2) - 10, 32, '#8c828c', 0, CRISP_FONT_ALT);
  
  // ── BOTTOM BAR ──
  ctx.fillStyle = 'rgba(8, 8, 14, 0.90)';
  ctx.fillRect(0, botContentY, W, botH);
  ctx.strokeStyle = 'rgba(200, 200, 200, 0.45)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, botContentY + 0.5); ctx.lineTo(W, botContentY + 0.5); ctx.stroke();
  
  // Player portrait
  const pPortraitX = pad + 20;
  const pPortraitY = botContentY + pad + 2;
  ctx.fillStyle = '#0c0c14';
  ctx.fillRect(pPortraitX, pPortraitY, portraitW, portraitH);
  drawGoldOutline(pPortraitX, pPortraitY, portraitW, portraitH, 3);
  if (PLAYER_SHEET.loaded) {
    const anim = PLAYER_SHEET.anims['idle_down'];
    ctx.save();
    ctx.beginPath();
    ctx.rect(pPortraitX + 1, pPortraitY + 1, portraitW - 2, portraitH - 2);
    ctx.clip();
    ctx.imageSmoothingEnabled = false;
    const pDrawSize = Math.round(portraitW * 0.7);
    const pdx = pPortraitX + 1 + Math.round((portraitW - 2 - pDrawSize) / 2);
    const pdy = pPortraitY + 1 + Math.round((portraitH - 2 - pDrawSize) / 2);
    ctx.drawImage(PLAYER_SHEET.img, 0, anim.row * PLAYER_SHEET.frameH, PLAYER_SHEET.frameW, PLAYER_SHEET.frameH,
      pdx, pdy, pDrawSize, pDrawSize);
    ctx.imageSmoothingEnabled = true;
    ctx.restore();
  }
  
  // HP below portrait
  crispText('HP 30/30', pPortraitX + 12, pPortraitY + portraitH + 4, 32, '#e8e0d0', 0, CRISP_FONT_ALT);
  
  // Equipment slots below HP — aligned with portrait
  const equipY = pPortraitY + portraitH + 42;
  const equipSlotW = portraitW;
  const equipSlotH = 28;
  const equipSpacing = 10;
  for (let i = 0; i < 2; i++) {
    const ey = equipY + i * (equipSlotH + equipSpacing);
    const equipped = (state.equipment && state.equipment[i]) || null;
    const isEquipHovered = mouse.x >= pPortraitX && mouse.x <= pPortraitX + equipSlotW && mouse.y >= ey && mouse.y <= ey + equipSlotH;
    // Background
    ctx.fillStyle = 'rgba(12, 12, 20, 0.6)';
    ctx.fillRect(pPortraitX, ey, equipSlotW, equipSlotH);
    // Gold border (brighter than other elements)
    const borderPulse = 0.5 + 0.2 * Math.sin(now / 500);
    ctx.strokeStyle = 'rgba(208, 168, 48,' + borderPulse + ')';
    ctx.lineWidth = 2;
    ctx.strokeRect(pPortraitX, ey, equipSlotW, equipSlotH);
    // Hover/highlight effect — stronger than regular items
    if (isEquipHovered) {
      const ePulse = 0.20 + 0.12 * Math.sin(now / 250);
      ctx.fillStyle = 'rgba(200, 170, 50,' + ePulse + ')';
      ctx.fillRect(pPortraitX + 1, ey, equipSlotW - 2, 1);
      ctx.fillRect(pPortraitX, ey + 1, equipSlotW, equipSlotH - 2);
      ctx.fillRect(pPortraitX + 1, ey + equipSlotH - 1, equipSlotW - 2, 1);
      // Inner glow
      ctx.shadowColor = '#d4a830';
      ctx.shadowBlur = 6;
      ctx.strokeStyle = 'rgba(212, 168, 48, 0.6)';
      ctx.lineWidth = 1;
      ctx.strokeRect(pPortraitX + 2, ey + 2, equipSlotW - 4, equipSlotH - 4);
      ctx.shadowBlur = 0;
    }
    const label = equipped || (i === 0 ? 'Slot 1' : 'Slot 2');
    crispText(label, pPortraitX + 6, ey + 2, 24, equipped ? '#e8e0d0' : '#706050', 0, CRISP_FONT_ALT);
  }
  
  // ── ACTION/ITEM GRID ──
  const gridX = pPortraitX + portraitW + 48;
  const gridRowH = 34;
  const gridY = pPortraitY;
  const colW = Math.round((W - gridX - 24) / 2);
  const items = getInventoryActions();
  
  // Mouse hover
  let hovered = -1;
  if (!state.inventorySubMenu) {
    for (let i = 0; i < items.length && i < 8; i++) {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const ax = gridX + col * colW;
      const ay = gridY + row * gridRowH;
      if (mouse.x >= ax && mouse.x <= ax + colW && mouse.y >= ay && mouse.y <= ay + gridRowH) {
        hovered = i;
      }
    }
    if (hovered >= 0) state.inventorySelected = hovered;
  }
  
  for (let i = 0; i < items.length && i < 8; i++) {
    const col = i % 2;
    const row = Math.floor(i / 2);
    const ax = gridX + col * colW;
    const ay = gridY + row * gridRowH;
    const isSelected = !state.inventorySubMenu && i === (state.inventorySelected || 0);
    const isOrderSource = state.inventoryOrdering !== undefined && i === state.inventoryOrdering;
    
    if (isOrderSource) {
      // Highlight source item in gold
      ctx.fillStyle = 'rgba(200, 160, 40, 0.25)';
      ctx.fillRect(ax + 4, ay, colW - 4, gridRowH);
    } else if (isSelected) {
      const hx = ax + 4;
      const hy = ay;
      const hw = colW - 4;
      const hh = gridRowH;
      const pulse = 0.14 + 0.08 * Math.sin(now / 300);
      ctx.fillStyle = 'rgba(80, 200, 60,' + pulse + ')';
      ctx.fillRect(hx + 1, hy, hw - 2, 1);
      ctx.fillRect(hx, hy + 1, hw, hh - 2);
      ctx.fillRect(hx + 1, hy + hh - 1, hw - 2, 1);
    }
    
    crispText(items[i], ax + 2, ay + 2, 32, '#ffffff');
  }
  
  // Selected item stats — aligned with action grid
  const sel = state.inventorySelected || 0;
  if (sel < items.length) {
    const act = COMBAT_ACTIONS[items[sel]] || {};
    const numRows = 4; // always reserve space for 8 slots (4 rows × 2 cols)
    const statsY = gridY + numRows * gridRowH + 4;
    let sx = gridX;
    const STAT_GRADIENT = [[0, '#8a6010'], [0.2, '#c89830'], [0.4, '#ffe8a0'], [0.5, '#fffff0'], [0.6, '#ffe8a0'], [0.8, '#c89830'], [1, '#8a6010']];
    const pad3 = (n) => String(n).padStart(3, ' ');
    sx += crispGradientText('Eff:', sx, statsY, 32, STAT_GRADIENT, 0, CRISP_FONT_ALT) + 2;
    sx += crispText(pad3(act.eff || 0), sx, statsY, 32, '#e8e0d0', 0, CRISP_FONT_ALT) + 12;
    sx += crispGradientText('Def:', sx, statsY, 32, STAT_GRADIENT, 0, CRISP_FONT_ALT) + 2;
    sx += crispText(pad3(act.def || 0), sx, statsY, 32, '#e8e0d0', 0, CRISP_FONT_ALT) + 12;
    sx += crispGradientText('Wait:', sx, statsY, 32, STAT_GRADIENT, 0, CRISP_FONT_ALT) + 2;
    crispText(pad3(act.wait || 0), sx, statsY, 32, '#e8e0d0', 0, CRISP_FONT_ALT);
    
    // Attack type tag (e.g. "Guard" for Defend)
    const ACTION_TAGS = { 'Defend': 'Guard' };
    const tag = ACTION_TAGS[items[sel]];
    if (tag) {
      const tagX = sx + 80;
      crispText(tag, tagX, statsY, 32, '#a0c8ff', 0, CRISP_FONT_ALT);
    }
    
    // Item description — two lines below stats
    const ACTION_DESCRIPTIONS = {
      'Punch': ['A quick jab.', 'Low power, low risk.'],
      'Kick': ['A strong kick.', 'High power, low defense.'],
      'Shortbow': ['Fires an arrow.', 'Balanced ranged attack.'],
      'Defend': ['Brace for impact.', 'High defense, no offense.'],
    };
    const desc = ACTION_DESCRIPTIONS[items[sel]];
    if (desc) {
      const descY = statsY + 28;
      crispText(desc[0], gridX, descY, 32, '#a09888', 0, CRISP_FONT_ALT);
      if (desc[1]) crispText(desc[1], gridX, descY + 20, 32, '#a09888', 0, CRISP_FONT_ALT);
    }
  }
  
  // ── SUB-MENU (Lv Up / Order / Drop) ──
  if (state.inventorySubMenu) {
    const subOpts = ['Lv Up', 'Order', 'Drop'];
    const subX = pPortraitX;
    const subY = pPortraitY + portraitH + 26;
    const subW = portraitW + 40;
    const subRowH = 28;
    
    // Background
    ctx.fillStyle = 'rgba(8, 8, 14, 0.95)';
    ctx.fillRect(subX, subY, subW, subRowH * subOpts.length + 8);
    drawGoldOutline(subX, subY, subW, subRowH * subOpts.length + 8, 4);
    
    for (let i = 0; i < subOpts.length; i++) {
      const sy = subY + 4 + i * subRowH;
      const isSel = i === (state.inventorySubSelected || 0);
      if (isSel) {
        const subPulse = 0.14 + 0.08 * Math.sin(now / 300);
        ctx.fillStyle = 'rgba(80, 200, 60,' + subPulse + ')';
        ctx.fillRect(subX + 5, sy, subW - 10, 1);
        ctx.fillRect(subX + 4, sy + 1, subW - 8, subRowH - 2);
        ctx.fillRect(subX + 5, sy + subRowH - 1, subW - 10, 1);
      }
      crispText(subOpts[i], subX + 12, sy + 2, 32, isSel ? '#ffffff' : '#a0a0a0');
    }
    
    // Mouse hover for sub-menu
    for (let i = 0; i < subOpts.length; i++) {
      const sy = subY + 4 + i * subRowH;
      if (mouse.x >= subX && mouse.x <= subX + subW && mouse.y >= sy && mouse.y <= sy + subRowH) {
        state.inventorySubSelected = i;
      }
    }
  }
  
  // Order mode hint
  if (state.inventoryOrdering !== undefined) {
    crispText('Select swap target', pPortraitX, pPortraitY + portraitH + 26, 32, '#c8a040', 0, CRISP_FONT_ALT);
  }
  
  // Save slot picker overlay
  if (state.saveMenu) {
    const boxW = 400, boxH = 130;
    const boxX = Math.round((W - boxW) / 2);
    const boxY = Math.round((H - boxH) / 2);
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(boxX, boxY, boxW, boxH);
    ctx.strokeStyle = '#d4a830';
    ctx.lineWidth = 2;
    ctx.strokeRect(boxX, boxY, boxW, boxH);
    crispText('Save to:', boxX + 10, boxY + 8, 32, '#f0d060', 0, CRISP_FONT_ALT);
    for (let i = 0; i < 3; i++) {
      const sy = boxY + 32 + i * 30;
      const info = getSaveInfo(i);
      const label = info ? 'Slot ' + (i + 1) + ' - ' + info.location : 'Slot ' + (i + 1) + ' - Empty';
      if (i === state.saveMenu.selected) {
        const savePulse = 0.20 + 0.10 * Math.sin(now / 300);
        ctx.fillStyle = 'rgba(80, 200, 60,' + savePulse + ')';
        ctx.fillRect(boxX + 5, sy - 2, boxW - 10, 1);

function drawPixelFrame() {

  ctx.fillRect(0, H - borderW, W, borderW); // bottom
  ctx.fillRect(0, 0, borderW, H); // left
  ctx.fillRect(W - borderW, 0, borderW, H); // right
  
  // Gold inner edge (1px line)
  ctx.fillStyle = '#8a7030';
  ctx.fillRect(borderW, borderW, W - borderW * 2, 1);
  ctx.fillRect(borderW, H - borderW - 1, W - borderW * 2, 1);
  ctx.fillRect(borderW, borderW, 1, H - borderW * 2);
  ctx.fillRect(W - borderW - 1, borderW, 1, H - borderW * 2);
  
  // Corner accents (small gold squares)
  const cs = 3;
  ctx.fillStyle = '#c09840';
  ctx.fillRect(borderW - cs, borderW - cs, cs * 2, cs * 2);
  ctx.fillRect(W - borderW - cs, borderW - cs, cs * 2, cs * 2);
  ctx.fillRect(borderW - cs, H - borderW - cs, cs * 2, cs * 2);
