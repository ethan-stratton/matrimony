<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrimony Beyond Space and Time</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=JetBrains+Mono:wght@300;400&family=Pixelify+Sans:wght@400;700&display=swap');
  @font-face { font-family: 'RM2000'; src: url('assets/fonts/RM2000.ttf'); }
  @font-face { font-family: 'RM2000Alt'; src: url('assets/fonts/RM2000Alt.ttf'); }
  @font-face { font-family: 'RMG2000'; src: url('assets/fonts/RMG2000.ttf'); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f; color: #c8c0b8;
    font-family: 'JetBrains Mono', monospace;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  h1 {
    font-family: 'Cinzel', serif; font-weight: 400;
    font-size: 1.2rem; color: #e8e0d8;
    letter-spacing: 0.06em; margin-bottom: 12px;
    text-shadow: 0 0 30px rgba(180, 140, 255, 0.3);
  }
  canvas#game {
    image-rendering: pixelated;
    background: #0a0a0f;
    border: 10px solid #0c0a08;
    border-top-color: #14100c;
    border-left-color: #14100c;
    outline: 2px solid #b08830;
    outline-offset: -12px;
    box-shadow:
      0 0 0 2px #0c0a08,
      0 0 0 4px #6a5020,
      0 0 0 5px #c8a040,
      0 0 0 6px #6a5020,
      inset 0 0 0 1px #604818,
      inset 0 0 0 2px #b08830,
      0 0 30px rgba(0,0,0,0.6),
      0 0 8px rgba(180,140,60,0.15);
  }
  .info {
    font-size: 0.6rem; color: #484040; margin-top: 8px;
  }
  .dialogue-box {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    width: 480px; max-width: 90vw;
    background: rgba(10, 8, 15, 0.95);
    border: 2px solid #3a3540; border-radius: 6px;
    padding: 14px 18px;
    font-size: 0.75rem; color: #c8b8a0; line-height: 1.7;
    display: none; z-index: 10;
  }
  .dialogue-box .speaker {
    font-family: 'Cinzel', serif; font-size: 0.7rem;
    color: #b89cff; margin-bottom: 6px;
  }
  .combat-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(5, 3, 10, 0.95);
    display: none; z-index: 20;
    align-items: center; justify-content: center;
    flex-direction: column;
  }
  .combat-overlay.active { display: flex; }
  .combat-overlay iframe {
    width: 900px; max-width: 95vw; height: 700px; max-height: 80vh;
    border: 2px solid #3a3540; border-radius: 6px;
  }
  .combat-close {
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
    color: #908880; margin-top: 10px; cursor: pointer;
    padding: 6px 16px; border: 1px solid #3a3540; border-radius: 4px;
    background: rgba(20, 18, 25, 0.9);
  }
  .combat-close:hover { border-color: #b89cff; color: #e8e0d8; }
</style>
</head>
<body>

<h1>Matrimony Beyond Space and Time</h1>
<canvas id="game"></canvas>
<div class="info">Arrow keys to move · Z to interact · X to cancel</div>

<script src="src/bootstrap.js?v=2.45"></script>
<script src="src/assets.js?v=2.45"></script>
<script src="src/state.js?v=2.45"></script>
<script src="src/level.js?v=2.45"></script>
<script src="src/input.js?v=2.45"></script>
<script src="src/combat.js?v=2.45"></script>
<script src="src/render.js?v=2.45"></script>
<script src="src/main.js?v=2.45"></script>
</body>
</html>
